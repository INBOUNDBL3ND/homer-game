<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOMER - Home Run Derby</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
canvas { display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
#rotate-msg {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #111; color: #fff; z-index: 9999;
  flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Arial Black', sans-serif; text-align: center;
}
#rotate-msg .icon { font-size: 60px; margin-bottom: 20px; }
#rotate-msg .text { font-size: 22px; }
@media (orientation: portrait) and (max-width: 900px) {
  #rotate-msg { display: flex !important; }
}
</style>
</head>
<body>
<div id="rotate-msg">
  <div class="icon">&#x1F4F1;&#x21BB;</div>
  <div class="text">Please rotate your device<br>to landscape mode</div>
</div>
<canvas id="game"></canvas>
<script>
(function() {
"use strict";

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1920, H = 1080;
canvas.width = W; canvas.height = H;

function resize() {
  const wr = window.innerWidth / W, hr = window.innerHeight / H;
  const s = Math.min(wr, hr);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ---- Game State ----
let state = 'title';
let round = 1, pitchesLeft = 10, homeRuns = 0, totalHR = 0;
let roundScores = [];
let pitch = null, bat = null, hitBall = null;
let swingTime = -1, canSwing = true;
let lastHitDist = 0, lastHitText = '', lastHitTimer = 0;
let hrTextTimer = 0, strikeTimer = 0, foulTimer = 0;
let shakeAmount = 0, shakeDecay = 0.9;
let fireworks = [], particles = [];
let consecutiveHR = 0;
let pitchDelay = 0;
let resultTimer = 0;
let ballTrail = [];
let impactFlash = 0;
let crowdFlash = 0;
let windupTimer = 0;
let windupPhase = 0; // 0=idle, 1=windup, 2=release
let frameCount = 0;

// ---- Pitch Types ----
const PITCH_TYPES = [
  { name: 'Fastball', speed: 0.018, mph: 95, curve: 0 },
  { name: 'Fastball', speed: 0.016, mph: 92, curve: 0 },
  { name: 'Changeup', speed: 0.012, mph: 82, curve: 0 },
  { name: 'Curveball', speed: 0.013, mph: 78, curve: 1 },
];

function randomPitch() {
  const pt = PITCH_TYPES[Math.floor(Math.random() * PITCH_TYPES.length)];
  return { ...pt, mph: pt.name === 'Fastball' ? 93 + Math.floor(Math.random()*6) : pt.name === 'Changeup' ? 80 + Math.floor(Math.random()*6) : 76 + Math.floor(Math.random()*6) };
}

// ---- Pre-render seat texture for performance ----
let seatCanvas = null;
function buildSeatTexture(w, h) {
  seatCanvas = document.createElement('canvas');
  seatCanvas.width = w;
  seatCanvas.height = h;
  const sc = seatCanvas.getContext('2d');
  // Fill with dark base
  sc.fillStyle = '#1a1a28';
  sc.fillRect(0, 0, w, h);
  // Draw rows of seats
  const seatW = 6, seatH = 4, gapX = 2, gapY = 3;
  const rng = mulberry32(42); // seeded random for consistency
  for (let y = 0; y < h; y += seatH + gapY) {
    for (let x = 0; x < w; x += seatW + gapX) {
      const r = rng();
      // Mostly red seats with some variation for "fans"
      if (r < 0.55) {
        sc.fillStyle = '#8B1A1A'; // dark red seat
      } else if (r < 0.72) {
        sc.fillStyle = '#A02020'; // medium red
      } else if (r < 0.82) {
        // "fan" - slight color variation
        const colors = ['#C4342E','#9B2020','#7A1818','#B83028','#742222'];
        sc.fillStyle = colors[Math.floor(r * 100) % colors.length];
      } else if (r < 0.90) {
        sc.fillStyle = '#6A1515';
      } else {
        // Empty or dark seat
        sc.fillStyle = '#501010';
      }
      sc.fillRect(x, y, seatW, seatH);
    }
  }
  return seatCanvas;
}

// Seeded random for consistent seat patterns
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Build seat texture on load
const seatTex = buildSeatTexture(800, 200);

// ---- Drawing Helpers ----

function drawSky() {
  // Evening sky gradient - deep and rich
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.42);
  g.addColorStop(0, '#05081a');
  g.addColorStop(0.2, '#0a1235');
  g.addColorStop(0.45, '#142252');
  g.addColorStop(0.7, '#1e3a6e');
  g.addColorStop(0.85, '#2a4a78');
  g.addColorStop(0.95, '#4a5a6a');
  g.addColorStop(1, '#6a5544');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.45);

  // Stars
  const rng = mulberry32(123);
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 120; i++) {
    const sx = rng() * W;
    const sy = rng() * H * 0.25;
    const brightness = 0.15 + rng() * 0.5;
    const sz = 0.5 + rng() * 1.5;
    // Subtle twinkle
    const twinkle = 0.7 + 0.3 * Math.sin(frameCount * 0.02 + i * 2.7);
    ctx.globalAlpha = brightness * twinkle;
    ctx.beginPath();
    ctx.arc(sx, sy, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Wispy clouds with depth
  for (let i = 0; i < 5; i++) {
    const rng2 = mulberry32(i * 77 + 31);
    const cx = rng2() * W;
    const cy = 30 + rng2() * 80;
    const cw = 180 + rng2() * 250;
    const ch = 12 + rng2() * 18;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw);
    cg.addColorStop(0, 'rgba(140,150,180,0.06)');
    cg.addColorStop(0.5, 'rgba(120,130,160,0.03)');
    cg.addColorStop(1, 'rgba(100,110,140,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw, ch, 0.1 * i, 0, Math.PI * 2);
    ctx.fill();
    // Second layer for depth
    ctx.fillStyle = 'rgba(160,170,200,0.025)';
    ctx.beginPath();
    ctx.ellipse(cx + 40, cy - 5, cw * 0.6, ch * 0.7, -0.05, 0, Math.PI * 2);
    ctx.fill();
  }

  // Horizon glow (sunset remnant)
  const hg = ctx.createLinearGradient(0, H * 0.32, 0, H * 0.44);
  hg.addColorStop(0, 'rgba(120,80,40,0)');
  hg.addColorStop(0.5, 'rgba(140,90,50,0.08)');
  hg.addColorStop(1, 'rgba(100,70,40,0.04)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, H * 0.32, W, H * 0.12);
}

function drawArch() {
  // Gateway Arch - properly proportioned stainless steel with reflections
  ctx.save();
  const archCx = 1240, archBase = 210, archH = 195, archW = 105;

  // Arch glow behind
  const archGlow = ctx.createRadialGradient(archCx, archBase - archH * 0.5, 10, archCx, archBase - archH * 0.3, archH);
  archGlow.addColorStop(0, 'rgba(180,200,220,0.06)');
  archGlow.addColorStop(1, 'rgba(180,200,220,0)');
  ctx.fillStyle = archGlow;
  ctx.beginPath();
  ctx.arc(archCx, archBase - archH * 0.3, archH, 0, Math.PI * 2);
  ctx.fill();

  // Draw arch with metallic gradient - thicker and more detailed
  for (let pass = 0; pass < 3; pass++) {
    const offset = (pass - 1) * 2;
    ctx.beginPath();
    for (let t = -1; t <= 1; t += 0.01) {
      const x = archCx + t * archW + offset;
      // Catenary approximation
      const y = archBase - archH * (1 - t * t * t * t);
      if (t === -1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }

    if (pass === 0) {
      // Dark shadow edge
      ctx.strokeStyle = 'rgba(60,70,80,0.5)';
      ctx.lineWidth = 10;
    } else if (pass === 1) {
      // Main metallic body
      const mg = ctx.createLinearGradient(archCx - archW, 0, archCx + archW, 0);
      mg.addColorStop(0, '#606878');
      mg.addColorStop(0.2, '#8890a0');
      mg.addColorStop(0.35, '#b8c0d0');
      mg.addColorStop(0.5, '#d0d8e8');
      mg.addColorStop(0.65, '#b0b8c8');
      mg.addColorStop(0.8, '#8890a0');
      mg.addColorStop(1, '#606878');
      ctx.strokeStyle = mg;
      ctx.lineWidth = 7;
    } else {
      // Highlight edge
      ctx.strokeStyle = 'rgba(220,230,250,0.25)';
      ctx.lineWidth = 2;
    }
    ctx.stroke();
  }

  // Base foundations
  ctx.fillStyle = '#505868';
  ctx.fillRect(archCx - archW - 4, archBase - 2, 10, 14);
  ctx.fillRect(archCx + archW - 6, archBase - 2, 10, 14);

  ctx.restore();
}

function drawStadiumStructure() {
  // ---- Canopy/roof line at top ----
  ctx.fillStyle = '#0e0e18';
  ctx.beginPath();
  ctx.moveTo(0, 195);
  ctx.lineTo(160, 195);
  ctx.lineTo(180, 200);
  ctx.lineTo(1740, 200);
  ctx.lineTo(1760, 195);
  ctx.lineTo(W, 195);
  ctx.lineTo(W, 210);
  ctx.lineTo(0, 210);
  ctx.closePath();
  ctx.fill();

  // ---- Upper deck ----
  ctx.save();
  const ug = ctx.createLinearGradient(0, 210, 0, 320);
  ug.addColorStop(0, '#1a1a2a');
  ug.addColorStop(0.5, '#222236');
  ug.addColorStop(1, '#1a1a28');
  ctx.fillStyle = ug;
  ctx.beginPath();
  ctx.moveTo(80, 330);
  ctx.lineTo(160, 210);
  ctx.lineTo(1760, 210);
  ctx.lineTo(1840, 330);
  ctx.closePath();
  ctx.fill();

  // Draw seats in upper deck using texture
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(80, 330);
  ctx.lineTo(160, 210);
  ctx.lineTo(1760, 210);
  ctx.lineTo(1840, 330);
  ctx.closePath();
  ctx.clip();
  ctx.globalAlpha = 0.7;
  // Tile the seat texture
  const pat1 = ctx.createPattern(seatTex, 'repeat');
  ctx.fillStyle = pat1;
  ctx.fillRect(80, 210, 1760, 130);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Concrete fascia between upper and club
  const fg1 = ctx.createLinearGradient(0, 328, 0, 345);
  fg1.addColorStop(0, '#3a3a48');
  fg1.addColorStop(0.5, '#4a4a58');
  fg1.addColorStop(1, '#3a3a48');
  ctx.fillStyle = fg1;
  ctx.beginPath();
  ctx.moveTo(80, 330);
  ctx.lineTo(1840, 330);
  ctx.lineTo(1830, 345);
  ctx.lineTo(90, 345);
  ctx.closePath();
  ctx.fill();

  // ---- Club level ----
  const cg = ctx.createLinearGradient(0, 345, 0, 385);
  cg.addColorStop(0, '#1e1e30');
  cg.addColorStop(1, '#242440');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.moveTo(90, 345);
  ctx.lineTo(1830, 345);
  ctx.lineTo(1815, 385);
  ctx.lineTo(105, 385);
  ctx.closePath();
  ctx.fill();

  // Club level windows/suites
  ctx.fillStyle = 'rgba(100,120,160,0.15)';
  for (let x = 130; x < 1800; x += 25) {
    ctx.fillRect(x, 350, 15, 28);
  }

  // Concrete fascia between club and lower
  const fg2 = ctx.createLinearGradient(0, 383, 0, 398);
  fg2.addColorStop(0, '#3a3a48');
  fg2.addColorStop(0.5, '#4a4a58');
  fg2.addColorStop(1, '#3a3a48');
  ctx.fillStyle = fg2;
  ctx.beginPath();
  ctx.moveTo(105, 385);
  ctx.lineTo(1815, 385);
  ctx.lineTo(1805, 398);
  ctx.lineTo(115, 398);
  ctx.closePath();
  ctx.fill();

  // ---- Lower deck ----
  const lg = ctx.createLinearGradient(0, 398, 0, 445);
  lg.addColorStop(0, '#1e1e30');
  lg.addColorStop(1, '#222238');
  ctx.fillStyle = lg;
  ctx.beginPath();
  ctx.moveTo(115, 398);
  ctx.lineTo(1805, 398);
  ctx.lineTo(1790, 445);
  ctx.lineTo(130, 445);
  ctx.closePath();
  ctx.fill();

  // Draw seats in lower deck
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(115, 398);
  ctx.lineTo(1805, 398);
  ctx.lineTo(1790, 445);
  ctx.lineTo(130, 445);
  ctx.closePath();
  ctx.clip();
  ctx.globalAlpha = 0.8;
  const pat2 = ctx.createPattern(seatTex, 'repeat');
  ctx.fillStyle = pat2;
  ctx.fillRect(115, 398, 1700, 50);
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.restore();

  // Crowd flash on home run
  if (crowdFlash > 0) {
    ctx.globalAlpha = crowdFlash * 0.15;
    ctx.fillStyle = '#fff';
    ctx.fillRect(80, 210, 1760, 240);
    ctx.globalAlpha = 1;
    crowdFlash -= 0.02;
  }
}

function drawScoreboard() {
  // LED scoreboard - like Busch Stadium video board in left-center
  const sbX = 320, sbY = 260, sbW = 220, sbH = 90;

  // Board backing
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(sbX, sbY, sbW, sbH);

  // Border - subtle LED frame
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 3;
  ctx.strokeRect(sbX, sbY, sbW, sbH);

  // Inner glow
  ctx.strokeStyle = 'rgba(50,60,100,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sbX + 3, sbY + 3, sbW - 6, sbH - 6);

  // LED pixel effect overlay
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#fff';
  for (let py = sbY + 5; py < sbY + sbH - 5; py += 3) {
    for (let px = sbX + 5; px < sbX + sbW - 5; px += 3) {
      ctx.fillRect(px, py, 1, 1);
    }
  }
  ctx.globalAlpha = 1;

  // LED text
  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#ffaa00';
  ctx.fillText('HOME RUN DERBY', sbX + sbW / 2, sbY + 18);

  // Divider line
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sbX + 10, sbY + 24);
  ctx.lineTo(sbX + sbW - 10, sbY + 24);
  ctx.stroke();

  // HR Count - big LED numbers
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#ff3333';
  // LED glow
  ctx.shadowColor = 'rgba(255,50,50,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText(String(totalHR + homeRuns).padStart(2, '0'), sbX + sbW / 2, sbY + 55);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#888899';
  ctx.fillText('HOME RUNS', sbX + sbW / 2, sbY + 68);

  // Round indicator
  ctx.fillStyle = '#44cc44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('RD ' + round + '  PITCH ' + (10 - pitchesLeft + 1) + '/10', sbX + sbW / 2, sbY + 83);
}

function drawOutfieldWall() {
  // Warning track
  ctx.fillStyle = '#7A5A14';
  ctx.beginPath();
  ctx.moveTo(50, 448);
  ctx.lineTo(1870, 448);
  ctx.lineTo(1850, 462);
  ctx.lineTo(70, 462);
  ctx.closePath();
  ctx.fill();

  // Outfield wall - dark green padded
  const wallG = ctx.createLinearGradient(0, 438, 0, 462);
  wallG.addColorStop(0, '#0a3a12');
  wallG.addColorStop(0.3, '#0e4a18');
  wallG.addColorStop(0.5, '#0c4215');
  wallG.addColorStop(0.7, '#0a3a12');
  wallG.addColorStop(1, '#08300e');
  ctx.fillStyle = wallG;
  ctx.beginPath();
  ctx.moveTo(50, 438);
  ctx.lineTo(1870, 438);
  ctx.lineTo(1870, 462);
  ctx.lineTo(50, 462);
  ctx.closePath();
  ctx.fill();

  // Padding vertical lines
  ctx.strokeStyle = 'rgba(5,25,8,0.6)';
  ctx.lineWidth = 1;
  for (let x = 70; x < 1860; x += 18) {
    ctx.beginPath();
    ctx.moveTo(x, 439);
    ctx.lineTo(x, 461);
    ctx.stroke();
  }

  // Yellow line on top of wall
  ctx.strokeStyle = '#ddcc00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(50, 438);
  ctx.lineTo(1870, 438);
  ctx.stroke();

  // Distance markers - hand-painted style
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  const distances = [
    [250, '330'], [500, '370'], [750, '390'], [960, '400'],
    [1170, '390'], [1420, '370'], [1670, '330']
  ];
  distances.forEach(([x, d]) => {
    ctx.fillText(d, x, 456);
  });

  // Foul poles - yellow
  ctx.strokeStyle = '#eedd00';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(52, 340); ctx.lineTo(52, 465); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1868, 340); ctx.lineTo(1868, 465); ctx.stroke();
  // Pole netting
  ctx.fillStyle = '#eedd00';
  ctx.fillRect(48, 335, 8, 8);
  ctx.fillRect(1864, 335, 8, 8);
}

function drawField() {
  // ---- Outfield grass ----
  const grassG = ctx.createLinearGradient(0, 462, 0, H);
  grassG.addColorStop(0, '#1a6a22');
  grassG.addColorStop(0.15, '#1e7228');
  grassG.addColorStop(0.5, '#1a6a22');
  grassG.addColorStop(1, '#146018');
  ctx.fillStyle = grassG;
  ctx.beginPath();
  ctx.moveTo(50, 462);
  ctx.lineTo(1870, 462);
  ctx.lineTo(W + 200, H + 100);
  ctx.lineTo(-200, H + 100);
  ctx.closePath();
  ctx.fill();

  // Mowing stripes - diamond/checkerboard pattern
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(50, 462);
  ctx.lineTo(1870, 462);
  ctx.lineTo(W + 200, H + 100);
  ctx.lineTo(-200, H + 100);
  ctx.closePath();
  ctx.clip();

  // Radiating mow lines from home plate (like real MLB)
  for (let i = 0; i < 20; i++) {
    if (i % 2 === 0) continue;
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#88ff88';
    ctx.beginPath();
    const angle1 = -0.9 + (i / 20) * 1.8;
    const angle2 = -0.9 + ((i + 1) / 20) * 1.8;
    const cx = 960, cy = H + 40;
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.sin(angle1) * 1200, cy - Math.cos(angle1) * 1200);
    ctx.lineTo(cx + Math.sin(angle2) * 1200, cy - Math.cos(angle2) * 1200);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Light sheen from stadium lights
  const sheenG = ctx.createRadialGradient(960, 500, 50, 960, 600, 700);
  sheenG.addColorStop(0, 'rgba(255,255,220,0.04)');
  sheenG.addColorStop(1, 'rgba(255,255,220,0)');
  ctx.fillStyle = sheenG;
  ctx.fillRect(0, 460, W, H);

  ctx.restore();

  // ---- Dirt infield ----
  const dirtG = ctx.createRadialGradient(960, 700, 20, 960, 700, 300);
  dirtG.addColorStop(0, '#9B7335');
  dirtG.addColorStop(0.5, '#8B6830');
  dirtG.addColorStop(1, '#7A5C28');
  ctx.fillStyle = dirtG;
  ctx.beginPath();
  ctx.moveTo(960, 548);
  ctx.quadraticCurveTo(680, 710, 570, H + 60);
  ctx.lineTo(1350, H + 60);
  ctx.quadraticCurveTo(1240, 710, 960, 548);
  ctx.closePath();
  ctx.fill();

  // Dirt texture - subtle noise
  ctx.globalAlpha = 0.04;
  const rng = mulberry32(777);
  for (let i = 0; i < 300; i++) {
    const dx = 700 + rng() * 520;
    const dy = 600 + rng() * 400;
    ctx.fillStyle = rng() > 0.5 ? '#4a3010' : '#c09040';
    ctx.fillRect(dx, dy, 2 + rng() * 3, 1 + rng() * 2);
  }
  ctx.globalAlpha = 1;

  // Grass cutout in infield (infield grass)
  ctx.fillStyle = '#1a7024';
  ctx.beginPath();
  ctx.moveTo(960, 575);
  ctx.lineTo(1160, 700);
  ctx.quadraticCurveTo(960, 820, 760, 700);
  ctx.closePath();
  ctx.fill();

  // Infield mow pattern
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#88ff88';
  ctx.beginPath();
  ctx.moveTo(960, 575);
  ctx.lineTo(1060, 650);
  ctx.lineTo(960, 750);
  ctx.lineTo(860, 650);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // ---- Base paths - chalk lines ----
  ctx.strokeStyle = 'rgba(220,210,190,0.5)';
  ctx.lineWidth = 2.5;
  // 1st base line
  ctx.beginPath(); ctx.moveTo(960, H + 20); ctx.lineTo(1300, 640); ctx.stroke();
  // 3rd base line
  ctx.beginPath(); ctx.moveTo(960, H + 20); ctx.lineTo(620, 640); ctx.stroke();

  // ---- Bases ----
  ctx.fillStyle = '#f0e8d8';
  // 1st base
  ctx.save(); ctx.translate(1175, 715); ctx.rotate(Math.PI / 4);
  ctx.fillRect(-9, -9, 18, 18); ctx.restore();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
  ctx.save(); ctx.translate(1175, 715); ctx.rotate(Math.PI / 4);
  ctx.strokeRect(-9, -9, 18, 18); ctx.restore();

  // 2nd base
  ctx.fillStyle = '#f0e8d8';
  ctx.save(); ctx.translate(960, 568); ctx.rotate(Math.PI / 4);
  ctx.fillRect(-8, -8, 16, 16); ctx.restore();

  // 3rd base
  ctx.save(); ctx.translate(745, 715); ctx.rotate(Math.PI / 4);
  ctx.fillRect(-9, -9, 18, 18); ctx.restore();

  // ---- Pitcher's mound ----
  // Elevated mound
  const moundG = ctx.createRadialGradient(960, 655, 5, 960, 660, 45);
  moundG.addColorStop(0, '#a88838');
  moundG.addColorStop(0.7, '#9B7730');
  moundG.addColorStop(1, '#7a6028');
  ctx.fillStyle = moundG;

function drawPitcher() {
  const px = 960, py = 645;
  ctx.save();

  let bodyTilt = 0;
  let armAngle = 0;
  let legSpread = 0;

  if (windupPhase === 1) {
    // Wind-up animation
    const wp = Math.min(1, windupTimer / 40);
    bodyTilt = Math.sin(wp * Math.PI) * 0.15;
    armAngle = wp * Math.PI * 0.8;
    legSpread = Math.sin(wp * Math.PI) * 4;
  } else if (windupPhase === 2) {
    // Delivery
    const dp = Math.min(1, windupTimer / 15);
    bodyTilt = -dp * 0.2;
    armAngle = Math.PI * 0.8 + dp * Math.PI * 0.7;
    legSpread = (1 - dp) * 6;
  }

  ctx.translate(px, py);
  ctx.rotate(bodyTilt);

  // Shadow on mound
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs - white pants
  ctx.fillStyle = '#e8e0d8';
  ctx.fillRect(-5 - legSpread, -8, 4, 12);
  ctx.fillRect(1 + legSpread, -8, 4, 12);

  // Cleats
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-6 - legSpread, 3, 5, 3);
  ctx.fillRect(1 + legSpread, 3, 5, 3);

  // Body/jersey - white with red trim
  ctx.fillStyle = '#e8e0d8';
  ctx.fillRect(-6, -24, 12, 18);

  // Red trim on jersey
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(-6, -24, 12, 2);
  ctx.fillRect(-6, -8, 12, 2);

  // Jersey number (subtle)
  ctx.fillStyle = '#cc2222';
  ctx.font = 'bold 6px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('45', 0, -13);

  // Pitching arm
  ctx.save();
  ctx.translate(5, -20);
  ctx.rotate(-Math.PI * 0.2 + armAngle * 0.3);
  // Upper arm
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(-2, 0, 4, 10);
  // Forearm + hand
  ctx.translate(0, 10);
  ctx.rotate(-0.3 + armAngle * 0.4);
  ctx.fillRect(-2, 0, 4, 9);
  // Glove or ball hand
  if (windupPhase <= 1) {
    // Holding ball
    ctx.fillStyle = '#f0e8d8';
    ctx.beginPath();
    ctx.arc(0, 11, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Glove arm (left)
  ctx.save();
  ctx.translate(-5, -20);
  ctx.rotate(0.3);
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(-2, 0, 4, 9);
  // Glove
  ctx.fillStyle = '#5a3a1a';
  ctx.beginPath();
  ctx.ellipse(-1, 12, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Head
  ctx.fillStyle = '#d4a574';
  ctx.beginPath();
  ctx.arc(0, -28, 6, 0, Math.PI * 2);
  ctx.fill();

  // Cap - Cardinals red
  ctx.fillStyle = '#cc2222';
  ctx.beginPath();
  ctx.ellipse(0, -33, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(-7, -35, 14, 4);
  // Bill
  ctx.fillStyle = '#aa1a1a';
  ctx.fillRect(-3, -31, 8, 3);

  ctx.restore();
}

function drawBall3D(x, y, size, rotation) {
  ctx.save();
  const r = rotation || 0;

  // Ground shadow (only for pitched ball near ground)
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(x + 2, y + size + 3, size * 0.8, size * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball body
  const bg = ctx.createRadialGradient(x - size * 0.3, y - size * 0.3, 0, x, y, size);
  bg.addColorStop(0, '#fffff8');
  bg.addColorStop(0.5, '#f0ead8');
  bg.addColorStop(0.8, '#ddd4c0');
  bg.addColorStop(1, '#b8b0a0');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();

  // Subtle edge shadow
  ctx.strokeStyle = 'rgba(80,70,50,0.3)';
  ctx.lineWidth = size * 0.08;
  ctx.beginPath();
  ctx.arc(x, y, size * 0.95, 0, Math.PI * 2);
  ctx.stroke();

  // Red stitching with rotation
  if (size > 5) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(r);

    ctx.strokeStyle = '#cc2222';
    ctx.lineWidth = Math.max(0.8, size * 0.08);

    // Left seam
    ctx.beginPath();
    for (let a = -0.85; a < 0.85; a += 0.1) {
      const sx = -size * 0.42 + Math.sin(a * 3.5) * size * 0.18;
      const sy = a * size * 0.85;
      if (a <= -0.85 + 0.1) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Right seam
    ctx.beginPath();
    for (let a = -0.85; a < 0.85; a += 0.1) {
      const sx = size * 0.42 - Math.sin(a * 3.5) * size * 0.18;
      const sy = a * size * 0.85;
      if (a <= -0.85 + 0.1) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Stitch marks
    if (size > 10) {
      ctx.strokeStyle = '#cc2222';
      ctx.lineWidth = Math.max(0.5, size * 0.04);
      for (let a = -0.7; a < 0.7; a += 0.25) {
        const lsx = -size * 0.42 + Math.sin(a * 3.5) * size * 0.18;
        const lsy = a * size * 0.85;
        ctx.beginPath();
        ctx.moveTo(lsx - size * 0.06, lsy);
        ctx.lineTo(lsx + size * 0.06, lsy);
        ctx.stroke();

        const rsx = size * 0.42 - Math.sin(a * 3.5) * size * 0.18;
        const rsy = a * size * 0.85;
        ctx.beginPath();
        ctx.moveTo(rsx - size * 0.06, rsy);
        ctx.lineTo(rsx + size * 0.06, rsy);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  // Specular highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(x - size * 0.25, y - size * 0.3, size * 0.2, size * 0.15, -0.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBallTrail() {
  for (let i = 0; i < ballTrail.length; i++) {
    const t = ballTrail[i];
    const alpha = (i / ballTrail.length) * 0.25;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.s * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Speed lines for fast pitches
  if (pitch && pitch.active && pitch.speed > 0.015 && pitch.t > 0.2 && pitch.t < 0.8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const ox = (Math.random() - 0.5) * pitch.size * 2;
      const oy = (Math.random() - 0.5) * pitch.size;
      ctx.beginPath();
      ctx.moveTo(pitch.x + ox, pitch.y + oy);
      ctx.lineTo(pitch.x + ox, pitch.y + oy - 15 - Math.random() * 20);
      ctx.stroke();
    }
  }
}

function drawHitBall() {
  if (!hitBall) return;
  const {x, y, z, size} = hitBall;
  const pz = Math.max(0.01, z);
  const perspective = 1 / (1 + pz * 0.003);
  const screenX = 960 + (x - 960) * perspective;
  const screenY = 460 + (H - 460) * perspective - hitBall.height * (1 / (1 + pz * 0.002));
  const screenSize = Math.max(1.5, size * perspective);

  if (screenY > 0 && screenY < H && screenX > 0 && screenX < W) {
    // Shadow on ground tracking ball
    const shadowY = 460 + (H - 460) * perspective;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(screenX, shadowY, Math.max(2, screenSize * 2.5), Math.max(1, screenSize * 0.4), 0, 0, Math.PI * 2);
    ctx.fill();

    // Trail effect behind hit ball
    if (hitBall.timer < 60) {
      const trailAlpha = Math.max(0, 0.15 - hitBall.timer * 0.002);
      ctx.strokeStyle = `rgba(255,255,255,${trailAlpha})`;
      ctx.lineWidth = screenSize * 0.6;
      ctx.beginPath();
      ctx.moveTo(screenX, screenY);
      ctx.lineTo(screenX - hitBall.vx * perspective * 3, screenY + 8);
      ctx.stroke();
    }

    drawBall3D(screenX, screenY, screenSize, hitBall.timer * 0.3);
  }
}

// ---- Fireworks ----
function spawnFirework(x, y) {
  const baseHue = Math.random() * 360;
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5;
    const hue = baseHue + (Math.random() - 0.5) * 40;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.008 + Math.random() * 0.015,
      color: `hsl(${hue}, 100%, ${60 + Math.random() * 30}%)`,
      size: 1.5 + Math.random() * 3,
      trail: true
    });
  }
  // Center flash
  particles.push({
    x, y,
    vx: 0, vy: 0,
    life: 0.8,
    decay: 0.06,
    color: '#fff',
    size: 15,
    trail: false
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    if (p.size > 2) {
      ctx.globalAlpha = Math.max(0, p.life * 0.3);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function drawImpactFlash() {
  if (impactFlash > 0) {
    const flashG = ctx.createRadialGradient(940, H - 60, 0, 940, H - 60, 80 * impactFlash);
    flashG.addColorStop(0, `rgba(255,255,255,${impactFlash * 0.8})`);
    flashG.addColorStop(0.5, `rgba(255,240,200,${impactFlash * 0.3})`);
    flashG.addColorStop(1, 'rgba(255,220,150,0)');
    ctx.fillStyle = flashG;
    ctx.beginPath();
    ctx.arc(940, H - 60, 80 * impactFlash, 0, Math.PI * 2);

// ---- Pitch Logic ----
function startPitch() {
  if (pitchesLeft <= 0) return;
  const pt = randomPitch();
  const targetX = 935 + Math.random() * 50;

  // Start windup
  windupPhase = 1;
  windupTimer = 0;

  // Delay pitch until windup completes
  setTimeout(() => {
    windupPhase = 2;
    windupTimer = 0;

    pitch = {
      t: 0,
      speed: pt.speed,
      curve: pt.curve,
      mph: pt.mph,
      name: pt.name,
      startX: 960,
      startY: 655,
      targetX: targetX,
      targetY: H - 50,
      x: 960,
      y: 655,
      size: 4,
      active: true,
      rotation: 0
    };
    pitchSpeedDisplay = { text: pt.mph + ' MPH  ' + pt.name.toUpperCase(), timer: 90 };
    canSwing = true;
    swingTime = -1;
    ballTrail = [];
    state = 'pitching';

    setTimeout(() => { windupPhase = 0; }, 250);
  }, 650);
}

function updatePitch(dt) {
  if (!pitch || !pitch.active) return;
  pitch.t += pitch.speed * dt;

  // Ball rotation
  pitch.rotation += pitch.speed * dt * 15;

  if (pitch.t >= 1) {
    if (swingTime < 0) {
      strikeTimer = 60;
      pitch.active = false;
      pitchesLeft--;
      canSwing = false;
      setTimeout(() => {
        if (pitchesLeft > 0) {
          state = 'playing';
          startPitch();
        } else endRound();
      }, 800);
    }
    return;
  }

  const t = pitch.t;
  const easeT = t * t;
  pitch.x = pitch.startX + (pitch.targetX - pitch.startX) * t;
  if (pitch.curve) {
    pitch.x += Math.sin(t * Math.PI) * 40 * pitch.curve;
  }
  pitch.y = pitch.startY + (pitch.targetY - pitch.startY) * easeT;
  pitch.size = 3 + easeT * 24;

  if (ballTrail.length > 10) ballTrail.shift();
  ballTrail.push({ x: pitch.x, y: pitch.y, s: pitch.size });
}

function doSwing() {
  if (!canSwing || swingTime >= 0 || !pitch || !pitch.active) return;
  swingTime = 0;
  canSwing = false;

  const t = pitch.t;
  const sweetSpot = 0.88;
  const diff = Math.abs(t - sweetSpot);

  setTimeout(() => {
    if (!pitch) return;
    pitch.active = false;
    pitchesLeft--;

    if (t < 0.5) {
      strikeTimer = 60;
      afterPitch();
      return;
    }

    if (diff < 0.04) {
      const dist = 400 + Math.random() * 80;
      const angle = -0.1 + Math.random() * 0.2;
      launchHitBall(dist, angle, true);
    } else if (diff < 0.1) {
      const dist = 320 + Math.random() * 100;
      const angle = (t > sweetSpot ? 0.3 : -0.3) + Math.random() * 0.2;
      const isHR = dist > 370;
      launchHitBall(dist, angle, isHR);
    } else if (diff < 0.2) {
      const angle = (t > sweetSpot ? 1.2 : -1.2);
      foulTimer = 60;
      launchHitBall(150, angle, false);
    } else {
      if (t > 0.6) {
        foulTimer = 60;
        launchHitBall(80, t > sweetSpot ? 1.5 : -1.5, false);
      } else {
        strikeTimer = 60;
      }
      afterPitch();
      return;
    }
  }, 120);
}

function launchHitBall(distance, angle, isHR) {
  const speed = distance * 0.3;
  hitBall = {
    x: 960,
    y: H - 60,
    z: 0,
    vx: Math.sin(angle) * speed * 0.3,
    vz: speed,
    vy: -speed * 0.4,
    height: 0,
    size: 18,
    distance: distance,
    isHR: isHR,
    timer: 0
  };

  lastHitDist = Math.round(distance);
  lastHitText = lastHitDist + ' FT';
  lastHitTimer = 80;
  impactFlash = 1;
  shakeAmount = isHR ? 10 : 4;

  if (isHR) {
    homeRuns++;
    consecutiveHR++;
    hrTextTimer = 100;
    crowdFlash = 1;
    setTimeout(() => {
      for (let i = 0; i < 3 + Math.min(consecutiveHR, 5); i++) {
        setTimeout(() => {
          spawnFirework(250 + Math.random() * 1420, 100 + Math.random() * 200);
        }, i * 250);
      }
    }, 500);
  } else {
    consecutiveHR = 0;
  }

  state = 'result';
  resultTimer = 120;
}

function updateHitBall() {
  if (!hitBall) return;
  hitBall.timer++;
  hitBall.x += hitBall.vx;
  hitBall.z += hitBall.vz;
  hitBall.height += hitBall.vy;
  hitBall.vy += 0.5;
  hitBall.vz *= 0.99;
  hitBall.vx *= 0.99;

  if (hitBall.height > 0 && hitBall.timer > 30) {
    hitBall = null;
  }
}

function afterPitch() {
  setTimeout(() => {
    if (pitchesLeft > 0) {
      state = 'playing';
      startPitch();
    } else {
      endRound();
    }
  }, 600);
}

function endRound() {
  roundScores.push(homeRuns);
  totalHR += homeRuns;
  round++;
  if (round > 3) {
    state = 'gameOver';
  } else {
    state = 'roundEnd';
  }
}

// ---- Main Loop ----
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(3, (timestamp - lastTime) / 16.67);
  lastTime = timestamp;
  frameCount++;

  // Update windup timer
  if (windupPhase > 0) {
    windupTimer += dt;
  }

  ctx.save();
  if (shakeAmount > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount,
      (Math.random() - 0.5) * shakeAmount
    );
    shakeAmount *= shakeDecay;
  }

  if (state === 'title') {
    drawTitle();
  } else if (state === 'roundEnd') {
    drawStadiumScene();
    drawRoundEnd();
  } else if (state === 'gameOver') {
    drawStadiumScene();
    drawGameOver();
  } else {
    drawStadiumScene();

    // Pitched ball
    if (pitch && pitch.active) {
      drawBallTrail();
      drawBall3D(pitch.x, pitch.y, pitch.size, pitch.rotation);
    }

    // Hit ball
    if (hitBall) {
      updateHitBall();
      drawHitBall();
    }

    // Batter (over-the-shoulder view)
    drawBatter();

    // Bat
    let swingProg = -1;
    if (swingTime >= 0) {
      swingProg = Math.min(1, swingTime / 8);
      swingTime += dt;
      if (swingTime > 20) swingTime = -1;
    }
    drawBatDetailed(swingProg);

    drawImpactFlash();
    drawParticles();
    drawHUD();

    updatePitch(dt);
    updateParticles();

    if (state === 'result') {
      resultTimer -= dt;
      if (resultTimer <= 0) {
        hitBall = null;
        afterPitch();
      }
    }
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

function drawStadiumScene() {
  drawSky();
  drawArch();
  drawStadiumStructure();
  drawScoreboard();
  drawStadiumLights();
  drawOutfieldWall();
  drawField();
  drawPitcher();
}

// ---- Input ----
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function handleInput(e) {
  e.preventDefault();
  const pos = getCanvasCoords(e);

  if (state === 'title') {
    if (pos.x > 830 && pos.x < 1090 && pos.y > 720 && pos.y < 782) {
      startGame();
    }
  } else if (state === 'pitching') {
    doSwing();
  } else if (state === 'roundEnd') {
    // Dynamic button position - check broad area
    if (pos.x > 800 && pos.x < 1120 && pos.y > 500 && pos.y < 700) {
      homeRuns = 0;
      pitchesLeft = 10;
      consecutiveHR = 0;
      state = 'playing';
      startPitch();
    }
  } else if (state === 'gameOver') {
    if (pos.x > 800 && pos.x < 1120 && pos.y > 600 && pos.y < 800) {
      resetGame();
      startGame();
    }
  }
}

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });
document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

function startGame() {
  round = 1;
  pitchesLeft = 10;
  homeRuns = 0;
  totalHR = 0;
  roundScores = [];
  consecutiveHR = 0;
  particles = [];
  fireworks = [];
  windupPhase = 0;
  windupTimer = 0;
  state = 'playing';
  startPitch();
}

function resetGame() {
  round = 1; pitchesLeft = 10; homeRuns = 0; totalHR = 0;
  roundScores = []; consecutiveHR = 0;
  particles = []; fireworks = [];
  pitch = null; hitBall = null; swingTime = -1;
  hrTextTimer = 0; strikeTimer = 0; foulTimer = 0;
  lastHitTimer = 0; shakeAmount = 0; impactFlash = 0;
  crowdFlash = 0; windupPhase = 0; windupTimer = 0;
}

requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
