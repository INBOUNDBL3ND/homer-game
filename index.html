<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOMER - Home Run Derby</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; }
canvas { display: block; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
#rotate-msg {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #111; color: #fff; z-index: 9999;
  flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Arial Black', sans-serif; text-align: center;
}
#rotate-msg .icon { font-size: 60px; margin-bottom: 20px; }
#rotate-msg .text { font-size: 22px; }
@media (orientation: portrait) and (max-width: 900px) {
  #rotate-msg { display: flex !important; }
}
</style>
</head>
<body>
<div id="rotate-msg">
  <div class="icon">&#x1F4F1;&#x21BB;</div>
  <div class="text">Please rotate your device<br>to landscape mode</div>
</div>
<canvas id="game"></canvas>
<script>
(function() {
"use strict";

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1920, H = 1080;
canvas.width = W; canvas.height = H;

function resize() {
  const wr = window.innerWidth / W, hr = window.innerHeight / H;
  const s = Math.min(wr, hr);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ---- Seeded PRNG ----
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ---- Game State ----
let state = 'title';
let round = 1, pitchesLeft = 10, homeRuns = 0, totalHR = 0;
let roundScores = [];
let pitch = null, bat = null, hitBall = null;
let swingTime = -1, canSwing = true;
let lastHitDist = 0, lastHitText = '', lastHitTimer = 0;
let hrTextTimer = 0, strikeTimer = 0, foulTimer = 0;
let shakeAmount = 0, shakeDecay = 0.9;
let fireworks = [], particles = [];
let consecutiveHR = 0;
let pitchDelay = 0;
let resultTimer = 0;
let ballTrail = [];
let impactFlash = 0;
let crowdFlash = 0;
let windupTimer = 0;
let windupPhase = 0;
let frameCount = 0;
let pitchSpeedDisplay = { text: '', timer: 0 };

// ---- Pitch Types ----
const PITCH_TYPES = [
  { name: 'Fastball', speed: 0.018, mph: 95, curve: 0 },
  { name: 'Fastball', speed: 0.016, mph: 92, curve: 0 },
  { name: 'Changeup', speed: 0.012, mph: 82, curve: 0 },
  { name: 'Curveball', speed: 0.013, mph: 78, curve: 1 },
];

function randomPitch() {
  const pt = PITCH_TYPES[Math.floor(Math.random() * PITCH_TYPES.length)];
  return { ...pt, mph: pt.name === 'Fastball' ? 93 + Math.floor(Math.random()*6) : pt.name === 'Changeup' ? 80 + Math.floor(Math.random()*6) : 76 + Math.floor(Math.random()*6) };
}

// ==============================================================
// PRE-RENDERED TEXTURES
// ==============================================================

// ---- Film grain overlay ----
let grainCanvas = document.createElement('canvas');
grainCanvas.width = 256; grainCanvas.height = 256;
(function buildGrain() {
  const gc = grainCanvas.getContext('2d');
  const id = gc.createImageData(256, 256);
  const rng = mulberry32(999);
  for (let i = 0; i < id.data.length; i += 4) {
    const v = Math.floor(rng() * 255);
    id.data[i] = id.data[i+1] = id.data[i+2] = v;
    id.data[i+3] = 255;
  }
  gc.putImageData(id, 0, 0);
})();

// ---- Crowd / Seat Texture (lower deck - most detail) ----
let seatCanvasLower = document.createElement('canvas');
seatCanvasLower.width = 1200; seatCanvasLower.height = 120;
(function buildLowerSeats() {
  const sc = seatCanvasLower.getContext('2d');
  sc.fillStyle = '#0e0a14';
  sc.fillRect(0, 0, 1200, 120);
  const rng = mulberry32(42);
  const seatW = 5, seatH = 3, gapX = 1.5, gapY = 2;
  for (let y = 0; y < 120; y += seatH + gapY) {
    for (let x = 0; x < 1200; x += seatW + gapX) {
      const r = rng();
      // More color variety for "fans"
      if (r < 0.30) sc.fillStyle = '#8B1A1A';
      else if (r < 0.45) sc.fillStyle = '#A02020';
      else if (r < 0.52) sc.fillStyle = '#C4342E';
      else if (r < 0.58) sc.fillStyle = '#cc3333';
      else if (r < 0.62) sc.fillStyle = '#e8e0d0'; // white shirt fan
      else if (r < 0.66) sc.fillStyle = '#b0c0d0'; // blue shirt
      else if (r < 0.69) sc.fillStyle = '#2a2a2a'; // dark jacket
      else if (r < 0.72) sc.fillStyle = '#d4a030'; // gold shirt
      else if (r < 0.78) sc.fillStyle = '#7A1818';
      else if (r < 0.85) sc.fillStyle = '#6A1515';
      else sc.fillStyle = '#501010';
      sc.fillRect(x, y, seatW, seatH);
      // Occasional head highlight
      if (rng() > 0.7) {
        sc.fillStyle = `rgba(${140+rng()*60},${100+rng()*50},${80+rng()*40},0.4)`;
        sc.beginPath();
        sc.arc(x + seatW/2, y - 0.5, 1.5, 0, Math.PI * 2);
        sc.fill();
      }
    }
  }
})();

// ---- Upper deck seats (hazier, less detail) ----
let seatCanvasUpper = document.createElement('canvas');
seatCanvasUpper.width = 1000; seatCanvasUpper.height = 100;
(function buildUpperSeats() {
  const sc = seatCanvasUpper.getContext('2d');
  sc.fillStyle = '#12101e';
  sc.fillRect(0, 0, 1000, 100);
  const rng = mulberry32(77);
  const seatW = 4, seatH = 2.5, gapX = 1, gapY = 1.5;
  for (let y = 0; y < 100; y += seatH + gapY) {
    for (let x = 0; x < 1000; x += seatW + gapX) {
      const r = rng();
      if (r < 0.40) sc.fillStyle = '#5a1212';
      else if (r < 0.60) sc.fillStyle = '#6A1818';
      else if (r < 0.70) sc.fillStyle = '#4a0e0e';
      else if (r < 0.78) sc.fillStyle = '#7a2020';
      else sc.fillStyle = '#3a0a0a';
      sc.fillRect(x, y, seatW, seatH);
    }
  }
  // Atmospheric haze over upper deck
  sc.fillStyle = 'rgba(30,35,60,0.35)';
  sc.fillRect(0, 0, 1000, 100);
})();

// ---- Dirt noise texture ----
let dirtNoiseCanvas = document.createElement('canvas');
dirtNoiseCanvas.width = 512; dirtNoiseCanvas.height = 512;
(function buildDirtNoise() {
  const dc = dirtNoiseCanvas.getContext('2d');
  const id = dc.createImageData(512, 512);
  const rng = mulberry32(333);
  for (let i = 0; i < id.data.length; i += 4) {
    const base = 120 + rng() * 60;
    id.data[i] = base + 20;
    id.data[i+1] = base - 10;
    id.data[i+2] = base - 40;
    id.data[i+3] = 18;
  }
  dc.putImageData(id, 0, 0);
})();

// ---- Grass noise texture ----
let grassNoiseCanvas = document.createElement('canvas');
grassNoiseCanvas.width = 512; grassNoiseCanvas.height = 512;
(function buildGrassNoise() {
  const gc = grassNoiseCanvas.getContext('2d');
  const id = gc.createImageData(512, 512);
  const rng = mulberry32(555);
  for (let i = 0; i < id.data.length; i += 4) {
    const v = rng() * 30;
    id.data[i] = 10 + v * 0.3;
    id.data[i+1] = 60 + v;
    id.data[i+2] = 10 + v * 0.2;
    id.data[i+3] = 15;
  }
  gc.putImageData(id, 0, 0);
})();

// ==============================================================
// DRAWING - SKY
// ==============================================================

function drawSky() {
  // Deep night sky - navy to warm dark blue-purple at horizon
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.44);
  g.addColorStop(0, '#020510');
  g.addColorStop(0.10, '#040a1a');
  g.addColorStop(0.25, '#08122e');
  g.addColorStop(0.45, '#101e48');
  g.addColorStop(0.65, '#1a2a58');
  g.addColorStop(0.80, '#253262');
  g.addColorStop(0.90, '#34385a');
  g.addColorStop(0.96, '#4a3e52');
  g.addColorStop(1, '#5a4844');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.46);

  // Stars - very tiny and subtle
  const rng = mulberry32(123);
  for (let i = 0; i < 180; i++) {
    const sx = rng() * W;
    const sy = rng() * H * 0.28;
    const brightness = 0.08 + rng() * 0.35;
    const sz = 0.3 + rng() * 1.2;
    const twinkle = 0.7 + 0.3 * Math.sin(frameCount * 0.015 + i * 2.7);
    ctx.globalAlpha = brightness * twinkle;
    ctx.fillStyle = rng() > 0.85 ? '#d0d8ff' : '#ffffff';
    ctx.beginPath();
    ctx.arc(sx, sy, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Very faint atmospheric wisps (not cartoon clouds)
  for (let i = 0; i < 6; i++) {
    const rng2 = mulberry32(i * 77 + 31);
    const cx = rng2() * W;
    const cy = 30 + rng2() * 100;
    const cw = 200 + rng2() * 350;
    const ch = 8 + rng2() * 14;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw);
    cg.addColorStop(0, 'rgba(100,110,140,0.035)');
    cg.addColorStop(0.5, 'rgba(80,90,120,0.015)');
    cg.addColorStop(1, 'rgba(60,70,100,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw, ch, 0.08 * i, 0, Math.PI * 2);
    ctx.fill();
  }

  // Warm horizon glow (golden hour remnant)
  const hg = ctx.createLinearGradient(0, H * 0.33, 0, H * 0.46);
  hg.addColorStop(0, 'rgba(100,60,30,0)');
  hg.addColorStop(0.4, 'rgba(130,80,40,0.06)');
  hg.addColorStop(0.7, 'rgba(120,75,35,0.04)');
  hg.addColorStop(1, 'rgba(80,55,30,0.02)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, H * 0.33, W, H * 0.13);

  // Subtle purple-blue atmospheric glow band
  const pg = ctx.createLinearGradient(0, H * 0.30, 0, H * 0.42);
  pg.addColorStop(0, 'rgba(60,40,80,0)');
  pg.addColorStop(0.5, 'rgba(50,35,70,0.04)');
  pg.addColorStop(1, 'rgba(40,30,60,0)');
  ctx.fillStyle = pg;
  ctx.fillRect(0, H * 0.30, W, H * 0.12);
}

// ==============================================================
// DRAWING - GATEWAY ARCH
// ==============================================================

function drawArch() {
  ctx.save();
  const archCx = 1250, archBase = 215, archH = 200, archW = 108;

  // Soft atmospheric glow behind arch
  const archGlow = ctx.createRadialGradient(archCx, archBase - archH * 0.45, 8, archCx, archBase - archH * 0.3, archH * 1.1);
  archGlow.addColorStop(0, 'rgba(160,175,200,0.06)');
  archGlow.addColorStop(0.5, 'rgba(140,155,180,0.025)');
  archGlow.addColorStop(1, 'rgba(120,135,160,0)');
  ctx.fillStyle = archGlow;
  ctx.beginPath();
  ctx.arc(archCx, archBase - archH * 0.3, archH * 1.1, 0, Math.PI * 2);
  ctx.fill();

  // Catenary curve: y = a * cosh(x/a) - a, where a = archH
  // For proper catenary: normalized so arch is 630x630
  function archY(t) {
    // t from -1 to 1, catenary approximation
    const cosh = (x) => (Math.exp(x) + Math.exp(-x)) / 2;
    const a = 1.0;
    const raw = cosh(t * 1.8) / cosh(1.8);
    return archBase - archH * (1 - raw);
  }

  // Pass 1: Wide dark shadow
  ctx.beginPath();
  for (let t = -1; t <= 1; t += 0.008) {
    const x = archCx + t * archW;
    const y = archY(t);
    if (t === -1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(20,25,35,0.6)';
  ctx.lineWidth = 13;
  ctx.stroke();

  // Pass 2: Main metallic body with multi-stop gradient
  ctx.beginPath();
  for (let t = -1; t <= 1; t += 0.008) {
    const x = archCx + t * archW;
    const y = archY(t);
    if (t === -1) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  const mg = ctx.createLinearGradient(archCx - archW, 0, archCx + archW, 0);
  mg.addColorStop(0, '#484f5e');
  mg.addColorStop(0.12, '#687080');
  mg.addColorStop(0.22, '#8890a2');
  mg.addColorStop(0.32, '#a8b0c4');
  mg.addColorStop(0.40, '#c8d0e2');
  mg.addColorStop(0.48, '#dce4f0');
  mg.addColorStop(0.55, '#c8d0e2');
  mg.addColorStop(0.65, '#a0a8b8');
  mg.addColorStop(0.78, '#787f90');
  mg.addColorStop(0.88, '#606878');
  mg.addColorStop(1, '#484f5e');
  ctx.strokeStyle = mg;
  ctx.lineWidth = 8;
  ctx.stroke();

  // Pass 3: Bright highlight on upper-left (moonlight reflection)
  ctx.beginPath();
  for (let t = -0.85; t <= 0.1; t += 0.008) {
    const x = archCx + t * archW - 2;
    const y = archY(t) - 1;
    if (t <= -0.85 + 0.008) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(220,230,250,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Pass 4: Thin dark edge on right
  ctx.beginPath();
  for (let t = 0.1; t <= 1; t += 0.008) {
    const x = archCx + t * archW + 3;
    const y = archY(t) + 1;
    if (t <= 0.1 + 0.008) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(30,35,45,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Base foundations
  ctx.fillStyle = '#3a3f4e';
  ctx.fillRect(archCx - archW - 5, archBase - 2, 12, 16);
  ctx.fillRect(archCx + archW - 7, archBase - 2, 12, 16);
  // Foundation highlight
  ctx.fillStyle = 'rgba(160,170,190,0.2)';
  ctx.fillRect(archCx - archW - 4, archBase - 1, 10, 3);
  ctx.fillRect(archCx + archW - 6, archBase - 1, 10, 3);

  ctx.restore();
}

// ==============================================================
// DRAWING - STADIUM STRUCTURE
// ==============================================================

function drawStadiumStructure() {
  // ---- Canopy / ribbon at top (Busch signature) ----
  // Dark canopy with subtle metallic sheen
  const canopyG = ctx.createLinearGradient(0, 185, 0, 215);
  canopyG.addColorStop(0, '#08080e');
  canopyG.addColorStop(0.3, '#12121e');
  canopyG.addColorStop(0.5, '#181825');
  canopyG.addColorStop(0.7, '#12121e');
  canopyG.addColorStop(1, '#0a0a14');
  ctx.fillStyle = canopyG;
  ctx.beginPath();
  ctx.moveTo(0, 192);
  ctx.lineTo(140, 192);
  // Distinctive wave shape
  ctx.quadraticCurveTo(200, 196, 300, 198);
  ctx.lineTo(1620, 198);
  ctx.quadraticCurveTo(1720, 196, 1780, 192);
  ctx.lineTo(W, 192);
  ctx.lineTo(W, 215);
  ctx.lineTo(0, 215);
  ctx.closePath();
  ctx.fill();
  // Canopy edge highlight
  ctx.strokeStyle = 'rgba(80,90,110,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 192);
  ctx.lineTo(140, 192);
  ctx.quadraticCurveTo(200, 196, 300, 198);
  ctx.lineTo(1620, 198);
  ctx.quadraticCurveTo(1720, 196, 1780, 192);
  ctx.lineTo(W, 192);
  ctx.stroke();

  // ---- UPPER DECK ----
  ctx.save();
  const udG = ctx.createLinearGradient(0, 215, 0, 330);
  udG.addColorStop(0, '#0e0e1e');
  udG.addColorStop(0.3, '#161628');
  udG.addColorStop(0.7, '#1a1a2c');
  udG.addColorStop(1, '#141422');
  ctx.fillStyle = udG;
  ctx.beginPath();
  ctx.moveTo(70, 335);
  ctx.lineTo(150, 215);
  ctx.lineTo(1770, 215);
  ctx.lineTo(1850, 335);
  ctx.closePath();
  ctx.fill();

  // Upper deck seat texture
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(70, 335);
  ctx.lineTo(150, 215);
  ctx.lineTo(1770, 215);
  ctx.lineTo(1850, 335);
  ctx.closePath();
  ctx.clip();
  ctx.globalAlpha = 0.65;
  const pat1 = ctx.createPattern(seatCanvasUpper, 'repeat');
  ctx.fillStyle = pat1;
  ctx.fillRect(70, 215, 1780, 125);
  ctx.globalAlpha = 1;

  // Atmospheric haze over upper deck (depth of field)
  const udHaze = ctx.createLinearGradient(0, 215, 0, 335);
  udHaze.addColorStop(0, 'rgba(25,30,50,0.45)');
  udHaze.addColorStop(0.5, 'rgba(20,25,45,0.30)');
  udHaze.addColorStop(1, 'rgba(18,20,38,0.20)');
  ctx.fillStyle = udHaze;
  ctx.fillRect(70, 215, 1780, 125);
  ctx.restore();

  // Concrete fascia upper/club
  const fg1 = ctx.createLinearGradient(0, 332, 0, 350);
  fg1.addColorStop(0, '#2a2a38');
  fg1.addColorStop(0.2, '#3d3d50');
  fg1.addColorStop(0.5, '#484860');
  fg1.addColorStop(0.8, '#3d3d50');
  fg1.addColorStop(1, '#2a2a38');
  ctx.fillStyle = fg1;
  ctx.beginPath();
  ctx.moveTo(70, 335);
  ctx.lineTo(1850, 335);
  ctx.lineTo(1840, 350);
  ctx.lineTo(80, 350);
  ctx.closePath();
  ctx.fill();
  // Shadow on bottom of fascia
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(80, 348, 1760, 3);

  // ---- CLUB / SUITE LEVEL ----
  const clG = ctx.createLinearGradient(0, 350, 0, 395);
  clG.addColorStop(0, '#141428');
  clG.addColorStop(0.5, '#1a1a34');
  clG.addColorStop(1, '#161630');
  ctx.fillStyle = clG;
  ctx.beginPath();
  ctx.moveTo(80, 350);
  ctx.lineTo(1840, 350);
  ctx.lineTo(1825, 395);
  ctx.lineTo(95, 395);
  ctx.closePath();
  ctx.fill();

  // Suite windows - warm interior glow
  for (let x = 120; x < 1810; x += 22) {
    const rng = mulberry32(x * 13 + 7);
    const warmth = rng();
    if (warmth > 0.4) {
      // Lit window
      const wg = ctx.createLinearGradient(x, 356, x, 386);
      wg.addColorStop(0, `rgba(${80+warmth*40},${70+warmth*30},${50+warmth*20},0.15)`);
      wg.addColorStop(1, `rgba(${60+warmth*30},${50+warmth*20},${35+warmth*15},0.08)`);
      ctx.fillStyle = wg;
    } else {
      ctx.fillStyle = 'rgba(40,45,70,0.12)';
    }
    ctx.fillRect(x, 356, 14, 30);
    // Window frame
    ctx.strokeStyle = 'rgba(60,65,85,0.15)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, 356, 14, 30);
  }

  // Concrete fascia club/lower
  const fg2 = ctx.createLinearGradient(0, 393, 0, 408);
  fg2.addColorStop(0, '#2a2a38');
  fg2.addColorStop(0.3, '#3d3d50');
  fg2.addColorStop(0.6, '#484860');
  fg2.addColorStop(1, '#2a2a38');
  ctx.fillStyle = fg2;
  ctx.beginPath();
  ctx.moveTo(95, 395);
  ctx.lineTo(1825, 395);
  ctx.lineTo(1815, 408);
  ctx.lineTo(105, 408);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(105, 406, 1710, 3);

  // ---- LOWER DECK (closest, most detail) ----
  const ldG = ctx.createLinearGradient(0, 408, 0, 455);
  ldG.addColorStop(0, '#121224');
  ldG.addColorStop(0.5, '#181832');
  ldG.addColorStop(1, '#141428');
  ctx.fillStyle = ldG;
  ctx.beginPath();
  ctx.moveTo(105, 408);
  ctx.lineTo(1815, 408);
  ctx.lineTo(1800, 455);
  ctx.lineTo(120, 455);
  ctx.closePath();
  ctx.fill();

  // Lower deck seat texture (most detail)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(105, 408);
  ctx.lineTo(1815, 408);
  ctx.lineTo(1800, 455);
  ctx.lineTo(120, 455);
  ctx.closePath();
  ctx.clip();
  ctx.globalAlpha = 0.85;
  const pat2 = ctx.createPattern(seatCanvasLower, 'repeat');
  ctx.fillStyle = pat2;
  ctx.fillRect(105, 408, 1710, 50);
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.restore();

  // ---- Crowd flash on HR ----
  if (crowdFlash > 0) {
    ctx.globalAlpha = crowdFlash * 0.12;
    ctx.fillStyle = '#ffe8c0';
    ctx.fillRect(70, 215, 1780, 245);
    ctx.globalAlpha = 1;
    crowdFlash -= 0.015;
  }
}

// ==============================================================
// SCOREBOARD (LED board in left-center)
// ==============================================================

function drawScoreboard() {
  const sbX = 310, sbY = 265, sbW = 230, sbH = 95;

  // Board backing with subtle depth
  const sbg = ctx.createLinearGradient(sbX, sbY, sbX, sbY + sbH);
  sbg.addColorStop(0, '#06060e');
  sbg.addColorStop(0.5, '#0a0a18');
  sbg.addColorStop(1, '#060610');
  ctx.fillStyle = sbg;
  ctx.fillRect(sbX, sbY, sbW, sbH);

  // Border - LED frame glow
  ctx.strokeStyle = '#1a1a38';
  ctx.lineWidth = 3;
  ctx.strokeRect(sbX, sbY, sbW, sbH);
  ctx.strokeStyle = 'rgba(40,50,90,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sbX + 3, sbY + 3, sbW - 6, sbH - 6);

  // Subtle LED pixel effect
  ctx.globalAlpha = 0.015;
  ctx.fillStyle = '#88aaff';
  for (let py = sbY + 5; py < sbY + sbH - 5; py += 3) {
    for (let px = sbX + 5; px < sbX + sbW - 5; px += 3) {
      ctx.fillRect(px, py, 1, 1);
    }
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#ffaa00';
  ctx.shadowColor = 'rgba(255,170,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.fillText('HOME RUN DERBY', sbX + sbW / 2, sbY + 18);
  ctx.shadowBlur = 0;

  // Divider
  ctx.strokeStyle = '#222244';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sbX + 10, sbY + 24);
  ctx.lineTo(sbX + sbW - 10, sbY + 24);
  ctx.stroke();

  // HR Count
  ctx.font = 'bold 30px monospace';
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = 'rgba(255,50,50,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText(String(totalHR + homeRuns).padStart(2, '0'), sbX + sbW / 2, sbY + 57);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#667788';
  ctx.fillText('HOME RUNS', sbX + sbW / 2, sbY + 70);

  ctx.fillStyle = '#33cc44';
  ctx.shadowColor = 'rgba(50,200,70,0.3)';
  ctx.shadowBlur = 3;
  ctx.font = 'bold 11px monospace';
  ctx.fillText('RD ' + round + '  PITCH ' + (10 - pitchesLeft + 1) + '/10', sbX + sbW / 2, sbY + 86);
  ctx.shadowBlur = 0;
}

// FIELD
// ==============================================================

function drawField() {
  // ---- Outfield grass with mow pattern ----
  const grassG = ctx.createLinearGradient(0, 466, 0, H);
  grassG.addColorStop(0, '#146818');
  grassG.addColorStop(0.08, '#187020');
  grassG.addColorStop(0.2, '#1a7424');
  grassG.addColorStop(0.5, '#167020');
  grassG.addColorStop(0.8, '#126418');
  grassG.addColorStop(1, '#0e5a14');
  ctx.fillStyle = grassG;
  ctx.beginPath();
  ctx.moveTo(40, 466);
  ctx.lineTo(1880, 466);
  ctx.lineTo(W + 200, H + 100);
  ctx.lineTo(-200, H + 100);
  ctx.closePath();
  ctx.fill();

  // Mowing stripes - radiating diamond/crosshatch from home plate
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(40, 466);
  ctx.lineTo(1880, 466);
  ctx.lineTo(W + 200, H + 100);
  ctx.lineTo(-200, H + 100);
  ctx.closePath();
  ctx.clip();

  // Diamond crosshatch mow pattern (Busch Stadium style)
  const cx = 960, cy = H + 60;
  // First set of radiating stripes
  for (let i = 0; i < 24; i++) {
    if (i % 2 === 0) continue;
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#60cc60';
    ctx.beginPath();
    const angle1 = -1.0 + (i / 24) * 2.0;
    const angle2 = -1.0 + ((i + 1) / 24) * 2.0;
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.sin(angle1) * 1400, cy - Math.cos(angle1) * 1400);
    ctx.lineTo(cx + Math.sin(angle2) * 1400, cy - Math.cos(angle2) * 1400);
    ctx.closePath();
    ctx.fill();
  }
  // Cross-pattern (perpendicular stripes for diamond effect)
  for (let i = 0; i < 20; i++) {
    if (i % 2 === 0) continue;
    ctx.globalAlpha = 0.02;
    ctx.fillStyle = '#50bb50';
    const y1 = 466 + i * 32;
    ctx.fillRect(-200, y1, W + 400, 16);
  }
  ctx.globalAlpha = 1;

  // Grass texture overlay
  const grassPat = ctx.createPattern(grassNoiseCanvas, 'repeat');
  ctx.fillStyle = grassPat;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(-200, 466, W + 400, H);
  ctx.globalAlpha = 1;

  // Stadium light sheen on grass
  const sheenG = ctx.createRadialGradient(960, 520, 30, 960, 600, 800);
  sheenG.addColorStop(0, 'rgba(255,255,210,0.05)');
  sheenG.addColorStop(0.5, 'rgba(255,255,200,0.02)');
  sheenG.addColorStop(1, 'rgba(255,255,200,0)');
  ctx.fillStyle = sheenG;
  ctx.fillRect(0, 466, W, H);

  // Hot spot highlights where lights hit the field
  const hotSpots = [[300, 560], [650, 530], [1270, 530], [1620, 560]];
  hotSpots.forEach(([hx, hy]) => {
    const hs = ctx.createRadialGradient(hx, hy, 10, hx, hy, 200);
    hs.addColorStop(0, 'rgba(255,255,220,0.025)');
    hs.addColorStop(1, 'rgba(255,255,220,0)');
    ctx.fillStyle = hs;
    ctx.beginPath();
    ctx.arc(hx, hy, 200, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();

  // ---- Dirt infield ----
  const dirtG = ctx.createRadialGradient(960, 710, 15, 960, 710, 320);
  dirtG.addColorStop(0, '#9E7838');
  dirtG.addColorStop(0.3, '#927030');
  dirtG.addColorStop(0.6, '#8B6828');
  dirtG.addColorStop(0.85, '#7A5C22');
  dirtG.addColorStop(1, '#6A5020');
  ctx.fillStyle = dirtG;
  ctx.beginPath();
  ctx.moveTo(960, 548);
  ctx.quadraticCurveTo(670, 720, 560, H + 60);
  ctx.lineTo(1360, H + 60);
  ctx.quadraticCurveTo(1250, 720, 960, 548);
  ctx.closePath();
  ctx.fill();

  // Dirt texture overlay
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(960, 548);
  ctx.quadraticCurveTo(670, 720, 560, H + 60);
  ctx.lineTo(1360, H + 60);
  ctx.quadraticCurveTo(1250, 720, 960, 548);
  ctx.closePath();
  ctx.clip();
  const dirtPat = ctx.createPattern(dirtNoiseCanvas, 'repeat');
  ctx.fillStyle = dirtPat;
  ctx.globalAlpha = 0.6;
  ctx.fillRect(500, 540, 920, 560);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Infield grass cutout
  const ifGrass = ctx.createRadialGradient(960, 690, 20, 960, 690, 150);
  ifGrass.addColorStop(0, '#1a7826');
  ifGrass.addColorStop(0.7, '#167020');
  ifGrass.addColorStop(1, '#146a1e');
  ctx.fillStyle = ifGrass;
  ctx.beginPath();
  ctx.moveTo(960, 575);
  ctx.lineTo(1170, 705);
  ctx.quadraticCurveTo(960, 830, 750, 705);
  ctx.closePath();
  ctx.fill();

  // Infield mow pattern (diamond)
  ctx.globalAlpha = 0.035;
  ctx.fillStyle = '#60cc60';
  ctx.beginPath();
  ctx.moveTo(960, 595);
  ctx.lineTo(1080, 670);
  ctx.lineTo(960, 760);
  ctx.lineTo(840, 670);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // ---- Base paths - chalk lines ----
  ctx.strokeStyle = 'rgba(220,215,200,0.5)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(960, H + 20); ctx.lineTo(1310, 645); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(960, H + 20); ctx.lineTo(610, 645); ctx.stroke();

  // ---- Bases with shadows ----
  // 1st base
  ctx.save();
  ctx.translate(1180, 720);
  ctx.rotate(Math.PI / 4);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(-8, -6, 18, 18);
  ctx.fillStyle = '#f0e8d8';
  ctx.fillRect(-9, -9, 18, 18);
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';

  ctx.strokeRect(-9, -9, 18, 18);

  // 2nd base

  ctx.rotate(Math.PI / 4);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(-6, -4, 16, 16);
  ctx.fillStyle = '#f0e8d8';
  ctx.fillRect(-8, -8, 16, 16);
  ctx.restore();

  // 3rd base
  ctx.save();
  ctx.translate(740, 720);
  ctx.rotate(Math.PI / 4);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(-8, -6, 18, 18);
  ctx.fillStyle = '#f0e8d8';
  ctx.fillRect(-9, -9, 18, 18);
  ctx.restore();

  // ---- Pitcher's mound ----
  // Elevated dirt mound
  const moundG = ctx.createRadialGradient(960, 658, 4, 960, 662, 48);
  moundG.addColorStop(0, '#aa8a3a');
  moundG.addColorStop(0.4, '#9E7E32');
  moundG.addColorStop(0.7, '#8B7028');
  moundG.addColorStop(1, '#7a6022');
  ctx.fillStyle = moundG;
  ctx.beginPath();
  ctx.ellipse(960, 662, 44, 20, 0, 0, Math.PI * 2);
  ctx.fill();
  // Landing area - worn darker
  ctx.fillStyle = 'rgba(60,45,15,0.2)';
  ctx.beginPath();
  ctx.ellipse(960, 670, 20, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Rubber (white)
  ctx.fillStyle = '#e8e0d0';
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 2;
  ctx.fillRect(952, 654, 16, 4);
  ctx.shadowBlur = 0;

  // ---- Home plate area ----
  // Dirt circle
  const hpDirtG = ctx.createRadialGradient(960, H - 28, 8, 960, H - 20, 130);
  hpDirtG.addColorStop(0, '#9E7E32');
  hpDirtG.addColorStop(0.6, '#8B6E28');
  hpDirtG.addColorStop(1, '#7A6020');
  ctx.fillStyle = hpDirtG;
  ctx.beginPath();
  ctx.ellipse(960, H - 25, 120, 55, 0, 0, Math.PI * 2);
  ctx.fill();

  // Dirt texture on home area
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(960, H - 25, 120, 55, 0, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = dirtPat;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(830, H - 85, 260, 120);
  ctx.globalAlpha = 1;
  ctx.restore();

  // Home plate
  ctx.fillStyle = '#e8e2d4';
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.moveTo(960, H - 8);
  ctx.lineTo(975, H - 22);
  ctx.lineTo(975, H - 42);
  ctx.lineTo(945, H - 42);
  ctx.lineTo(945, H - 22);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Batter's box chalk lines (scuffed)
  ctx.strokeStyle = 'rgba(230,225,215,0.5)';
  ctx.lineWidth = 2;
  // Left box
  ctx.setLineDash([8, 3]);
  ctx.strokeRect(896, H - 62, 40, 60);
  // Right box
  ctx.strokeRect(984, H - 62, 40, 60);
  ctx.setLineDash([]);

  // On-deck circle (left side)
  ctx.strokeStyle = 'rgba(220,215,200,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(780, H - 10, 25, 0, Math.PI * 2);
  ctx.stroke();

  // ---- Catcher ----
  ctx.save();
  // Catcher body (crouching behind plate)
  // Chest protector
  ctx.fillStyle = '#1a1a28';
  ctx.beginPath();
  ctx.ellipse(960, H + 4, 28, 20, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // Body detail
  ctx.fillStyle = '#22222e';
  ctx.fillRect(940, H - 12, 40, 18);
  // Shin guards
  ctx.fillStyle = '#282838';
  ctx.fillRect(938, H + 2, 12, 16);
  ctx.fillRect(970, H + 2, 12, 16);
  // Head/helmet
  const catcherHelmG = ctx.createRadialGradient(960, H - 12, 2, 960, H - 10, 12);
  catcherHelmG.addColorStop(0, '#333340');
  catcherHelmG.addColorStop(1, '#1a1a28');
  ctx.fillStyle = catcherHelmG;
  ctx.beginPath();
  ctx.arc(960, H - 10, 11, 0, Math.PI * 2);

  // Facemask bars

  ctx.moveTo(955, H - 5); ctx.lineTo(955, H + 2);
  ctx.moveTo(960, H - 5); ctx.lineTo(960, H + 2);
  ctx.moveTo(965, H - 5); ctx.lineTo(965, H + 2);

  // Mitt pocket

  ctx.beginPath();
  ctx.ellipse(941, H - 1, 7, 6, -0.2, 0, Math.PI * 2);

  ctx.restore();

  // ---- Umpire ----
  ctx.fillStyle = '#0e0e18';
  ctx.beginPath();
  ctx.ellipse(960, H + 28, 22, 24, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#121220';
  ctx.beginPath();

}

// ==============================================================
// STADIUM LIGHTS
// ==============================================================

function drawStadiumLights() {
  const poles = [
    [60, 182], [270, 172], [490, 192],
    [1430, 192], [1650, 172], [1860, 182]
  ];
  poles.forEach(([px, py]) => {
    // Pole (steel grey)
    const poleG = ctx.createLinearGradient(px - 3, py, px + 3, py);
    poleG.addColorStop(0, '#2a2a3a');
    poleG.addColorStop(0.5, '#3a3a4e');
    poleG.addColorStop(1, '#2a2a3a');
    ctx.strokeStyle = poleG;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px, 442);
    ctx.stroke();

    // Light bank housing
    ctx.fillStyle = '#222230';
    ctx.fillRect(px - 20, py - 14, 40, 18);
    // Housing shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(px - 20, py + 2, 40, 4);

    // Light bank - very bright with bloom
    ctx.fillStyle = '#fffff4';
    ctx.shadowColor = 'rgba(255,255,210,0.8)';
    ctx.shadowBlur = 35;
    ctx.fillRect(px - 16, py - 10, 32, 12);
    ctx.shadowBlur = 0;

    // Secondary bloom layer
    const bloom = ctx.createRadialGradient(px, py - 4, 5, px, py - 4, 60);
    bloom.addColorStop(0, 'rgba(255,255,220,0.18)');
    bloom.addColorStop(0.3, 'rgba(255,255,200,0.08)');
    bloom.addColorStop(0.6, 'rgba(255,255,180,0.02)');
    bloom.addColorStop(1, 'rgba(255,255,180,0)');
    ctx.fillStyle = bloom;
    ctx.beginPath();
    ctx.arc(px, py - 4, 60, 0, Math.PI * 2);
    ctx.fill();

    // Light halo (larger, softer)
    const halo = ctx.createRadialGradient(px, py, 3, px, py, 110);
    halo.addColorStop(0, 'rgba(255,255,200,0.08)');
    halo.addColorStop(0.4, 'rgba(255,255,180,0.03)');
    halo.addColorStop(1, 'rgba(255,255,180,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(px, py, 110, 0, Math.PI * 2);
    ctx.fill();

    // Light beams onto field (volumetric)
    ctx.fillStyle = 'rgba(255,255,210,0.008)';
    ctx.beginPath();
    ctx.moveTo(px - 16, py + 8);
    ctx.lineTo(px - 300, 520);
    ctx.lineTo(px + 300, 520);
    ctx.lineTo(px + 16, py + 8);
    ctx.closePath();
    ctx.fill();
    // Second beam pass for volume
    ctx.fillStyle = 'rgba(255,255,200,0.005)';
    ctx.beginPath();
    ctx.moveTo(px - 10, py + 8);
    ctx.lineTo(px - 180, 500);
    ctx.lineTo(px + 180, 500);
    ctx.lineTo(px + 10, py + 8);
    ctx.closePath();
    ctx.fill();
  });
}

// ==============================================================
// PITCHER
// ==============================================================

function drawPitcher() {
  const px = 960, py = 645;
  ctx.save();

  let bodyTilt = 0, armAngle = 0, legSpread = 0;
  if (windupPhase === 1) {
    const wp = Math.min(1, windupTimer / 40);
    bodyTilt = Math.sin(wp * Math.PI) * 0.15;
    armAngle = wp * Math.PI * 0.8;
    legSpread = Math.sin(wp * Math.PI) * 4;
  } else if (windupPhase === 2) {
    const dp = Math.min(1, windupTimer / 15);
    bodyTilt = -dp * 0.2;
    armAngle = Math.PI * 0.8 + dp * Math.PI * 0.7;
    legSpread = (1 - dp) * 6;
  }

  ctx.translate(px, py);
  ctx.rotate(bodyTilt);

  // Shadow on mound
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 3, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs - white pants with subtle shading
  const legG = ctx.createLinearGradient(-6, -8, 6, 4);
  legG.addColorStop(0, '#e0d8d0');
  legG.addColorStop(1, '#c8c0b8');
  ctx.fillStyle = legG;
  ctx.fillRect(-5 - legSpread, -8, 4, 13);
  ctx.fillRect(1 + legSpread, -8, 4, 13);

  // Cleats
  ctx.fillStyle = '#111118';
  ctx.fillRect(-6 - legSpread, 4, 6, 3);
  ctx.fillRect(1 + legSpread, 4, 6, 3);

  // Body/jersey - Cardinals white with red trim
  const jerseyG = ctx.createLinearGradient(-7, -25, 7, -8);
  jerseyG.addColorStop(0, '#e8e0d8');
  jerseyG.addColorStop(0.5, '#f0e8e0');
  jerseyG.addColorStop(1, '#d8d0c8');
  ctx.fillStyle = jerseyG;
  ctx.fillRect(-7, -25, 14, 19);

  // Red trim
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(-7, -25, 14, 2);
  ctx.fillRect(-7, -8, 14, 2);

  // Jersey number
  ctx.fillStyle = '#cc2222';
  ctx.font = 'bold 7px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('45', 0, -13);

  // Pitching arm
  ctx.save();
  ctx.translate(6, -21);
  ctx.rotate(-Math.PI * 0.2 + armAngle * 0.3);
  ctx.fillStyle = '#c89a68';
  ctx.fillRect(-2, 0, 4, 11);
  ctx.translate(0, 11);
  ctx.rotate(-0.3 + armAngle * 0.4);
  ctx.fillRect(-2, 0, 4, 10);
  if (windupPhase <= 1) {
    ctx.fillStyle = '#f0e8d8';
    ctx.beginPath();
    ctx.arc(0, 12, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Glove arm
  ctx.save();
  ctx.translate(-6, -21);
  ctx.rotate(0.3);
  ctx.fillStyle = '#c89a68';
  ctx.fillRect(-2, 0, 4, 10);
  ctx.fillStyle = '#4a2a10';
  ctx.beginPath();
  ctx.ellipse(-1, 13, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glove webbing

// ==============================================================
// BASEBALL
// ==============================================================

function drawBall3D(x, y, size, rotation) {
  ctx.save();
  const r = rotation || 0;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(x + 2, y + size + 4, size * 0.9, size * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball body with realistic shading
  const bg = ctx.createRadialGradient(x - size * 0.3, y - size * 0.3, 0, x, y, size);
  bg.addColorStop(0, '#fffff8');
  bg.addColorStop(0.3, '#f8f2e4');
  bg.addColorStop(0.6, '#e8e0cc');
  bg.addColorStop(0.85, '#ccc4b0');
  bg.addColorStop(1, '#a8a090');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();

  // Subtle rim light
  ctx.strokeStyle = 'rgba(60,55,40,0.25)';
  ctx.lineWidth = size * 0.06;
  ctx.beginPath();
  ctx.arc(x, y, size * 0.96, 0, Math.PI * 2);
  ctx.stroke();

  // Red stitching with rotation
  if (size > 5) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(r);

    ctx.strokeStyle = '#cc2020';
    ctx.lineWidth = Math.max(0.8, size * 0.07);

    // Left seam
    ctx.beginPath();
    for (let a = -0.85; a < 0.85; a += 0.08) {
      const sx = -size * 0.42 + Math.sin(a * 3.5) * size * 0.18;
      const sy = a * size * 0.85;
      if (a <= -0.85 + 0.08) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Right seam
    ctx.beginPath();
    for (let a = -0.85; a < 0.85; a += 0.08) {
      const sx = size * 0.42 - Math.sin(a * 3.5) * size * 0.18;
      const sy = a * size * 0.85;
      if (a <= -0.85 + 0.08) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Stitch marks
    if (size > 10) {
      ctx.strokeStyle = '#cc2020';
      ctx.lineWidth = Math.max(0.5, size * 0.04);
      for (let a = -0.7; a < 0.7; a += 0.22) {
        const lsx = -size * 0.42 + Math.sin(a * 3.5) * size * 0.18;
        const lsy = a * size * 0.85;
        ctx.beginPath();
        ctx.moveTo(lsx - size * 0.07, lsy);
        ctx.lineTo(lsx + size * 0.07, lsy);
        ctx.stroke();
        const rsx = size * 0.42 - Math.sin(a * 3.5) * size * 0.18;
        const rsy = a * size * 0.85;
        ctx.beginPath();
        ctx.moveTo(rsx - size * 0.07, rsy);
        ctx.lineTo(rsx + size * 0.07, rsy);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Specular highlight
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.beginPath();
  ctx.ellipse(x - size * 0.25, y - size * 0.3, size * 0.22, size * 0.14, -0.5, 0, Math.PI * 2);
  ctx.fill();
  // Secondary highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.ellipse(x + size * 0.1, y - size * 0.15, size * 0.08, size * 0.06, 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ==============================================================
// BAT (detailed Louisville Slugger)

function drawBatDetailed(swingProg) {
  ctx.save();
  const batBaseX = 940, batBaseY = H - 40;
  ctx.translate(batBaseX, batBaseY);

  let angle;
  if (swingProg < 0) {
    angle = -0.55;
  } else {
    // Smooth multi-phase swing
    if (swingProg < 0.3) {
      // Load back
      angle = -0.55 - swingProg * 0.5;
    } else if (swingProg < 0.7) {
      // Explosive forward swing through zone
      const t = (swingProg - 0.3) / 0.4;
      angle = -0.70 + t * 2.2;
    } else {
      // Follow through
      const t = (swingProg - 0.7) / 0.3;
      angle = 1.5 + t * 0.5;
    }
  }
  ctx.rotate(angle);

  // ---- Hands with batting gloves ----
  // Back hand (bottom) - red/white batting gloves
  const gloveG = ctx.createRadialGradient(0, -8, 3, 0, -8, 16);
  gloveG.addColorStop(0, '#cc2020');
  gloveG.addColorStop(0.6, '#aa1818');
  gloveG.addColorStop(1, '#881414');
  ctx.fillStyle = gloveG;
  ctx.beginPath();
  ctx.ellipse(0, -8, 16, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Front hand (top)
  ctx.fillStyle = '#e8e0d8';
  ctx.beginPath();
  ctx.ellipse(-2, -22, 14, 11, 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Glove detail - white stripe
  ctx.fillStyle = '#f0e8e0';
  ctx.fillRect(-10, -4, 20, 3);
  // Finger articulation
  ctx.strokeStyle = 'rgba(100,20,20,0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-8 + i * 5, -15);
    ctx.lineTo(-8 + i * 5, -4);
    ctx.stroke();
  }
  // Wrist tape
  ctx.fillStyle = '#222';
  ctx.fillRect(-13, 0, 26, 4);

  // ---- Bat knob (flared) ----
  ctx.fillStyle = '#2a1608';
  ctx.beginPath();
  ctx.ellipse(0, 6, 12, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Knob highlight
  ctx.fillStyle = 'rgba(200,160,80,0.15)';
  ctx.beginPath();
  ctx.ellipse(-3, 4, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // ---- Bat handle (grip tape) ----
  const handleG = ctx.createLinearGradient(-5, -35, 5, -35);
  handleG.addColorStop(0, '#1a0e06');
  handleG.addColorStop(0.3, '#2a1a0e');
  handleG.addColorStop(0.7, '#2a1a0e');
  handleG.addColorStop(1, '#1a0e06');
  ctx.fillStyle = handleG;
  ctx.fillRect(-5, -36, 10, 42);
  // Grip tape diagonal wrapping
  ctx.strokeStyle = 'rgba(50,30,8,0.7)';
  ctx.lineWidth = 1.5;
  for (let ty = -34; ty < 2; ty += 4) {
    ctx.beginPath();
    ctx.moveTo(-6, ty);
    ctx.lineTo(6, ty + 2.5);
    ctx.stroke();
  }

  // ---- Bat barrel ----
  const batG = ctx.createLinearGradient(-16, -200, 16, -200);
  batG.addColorStop(0, '#5a3a08');
  batG.addColorStop(0.10, '#7a5810');
  batG.addColorStop(0.22, '#9a7820');
  batG.addColorStop(0.35, '#b89230');
  batG.addColorStop(0.48, '#d4aa44');
  batG.addColorStop(0.55, '#dab04a');
  batG.addColorStop(0.65, '#c8a038');
  batG.addColorStop(0.78, '#a88428');
  batG.addColorStop(0.88, '#886818');
  batG.addColorStop(1, '#5a3a08');
  ctx.fillStyle = batG;

  // Barrel shape - proper taper
  ctx.beginPath();
  ctx.moveTo(-5, -36);
  ctx.lineTo(-6.5, -55);
  ctx.lineTo(-9, -90);
  ctx.lineTo(-12, -130);
  ctx.lineTo(-14.5, -170);
  ctx.lineTo(-15.5, -200);
  ctx.lineTo(-14.5, -218);
  ctx.quadraticCurveTo(0, -224, 14.5, -218);
  ctx.lineTo(15.5, -200);
  ctx.lineTo(14.5, -170);
  ctx.lineTo(12, -130);
  ctx.lineTo(9, -90);
  ctx.lineTo(6.5, -55);
  ctx.lineTo(5, -36);
  ctx.closePath();
  ctx.fill();

  // Wood grain lines - fine detail
  ctx.strokeStyle = 'rgba(70,45,8,0.12)';
  ctx.lineWidth = 0.6;
  for (let gx = -11; gx <= 11; gx += 2.5) {
    ctx.beginPath();
    const wobble = Math.sin(gx * 0.3) * 0.5;
    ctx.moveTo(gx * 0.45 + wobble, -40);
    ctx.quadraticCurveTo(gx * 1.05, -130, gx * 1.2 + wobble, -215);
    ctx.stroke();
  }

  // Brand/logo area
  ctx.save();
  ctx.translate(0, -152);
  ctx.rotate(0.04);
  // Oval logo background
  ctx.fillStyle = 'rgba(40,25,5,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillText('LOUISVILLE', 0, -6);
  ctx.fillText('SLUGGER', 0, 2);
  // Small trademark
  ctx.font = '4px Arial';
  ctx.fillText('C271', 0, 10);
  ctx.restore();

  // Barrel end cap (cupped)
  const capG = ctx.createRadialGradient(0, -218, 2, 0, -218, 14);
  capG.addColorStop(0, '#8a6a18');
  capG.addColorStop(0.5, '#a07a20');
  capG.addColorStop(1, '#7a5a14');
  ctx.fillStyle = capG;
  ctx.beginPath();
  ctx.ellipse(0, -218, 14.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Cup indent
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(0, -219, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Barrel specular highlight (long thin shine)
  ctx.fillStyle = 'rgba(255,255,220,0.10)';
  ctx.fillRect(3, -210, 3, 150);
  // Secondary softer highlight
  ctx.fillStyle = 'rgba(255,255,220,0.05)';
  ctx.fillRect(-2, -200, 2, 120);

  ctx.restore();
}

// ==============================================================
// BALL TRAIL + HIT BALL
// ==============================================================

function drawBallTrail() {
  for (let i = 0; i < ballTrail.length; i++) {
    const t = ballTrail[i];
    const alpha = (i / ballTrail.length) * 0.2;
    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.s * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }

  // Speed lines for fast pitches
  if (pitch && pitch.active && pitch.speed > 0.015 && pitch.t > 0.2 && pitch.t < 0.8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const ox = (Math.random() - 0.5) * pitch.size * 1.8;
      const oy = (Math.random() - 0.5) * pitch.size * 0.8;
      ctx.beginPath();
      ctx.moveTo(pitch.x + ox, pitch.y + oy);
      ctx.lineTo(pitch.x + ox, pitch.y + oy - 18 - Math.random() * 25);
      ctx.stroke();
    }
  }
}

function drawHitBall() {
  if (!hitBall) return;
  const {x, y, z, size} = hitBall;
  const pz = Math.max(0.01, z);
  const perspective = 1 / (1 + pz * 0.003);
  const screenX = 960 + (x - 960) * perspective;
  const screenY = 460 + (H - 460) * perspective - hitBall.height * (1 / (1 + pz * 0.002));
  const screenSize = Math.max(1.5, size * perspective);

  if (screenY > 0 && screenY < H && screenX > 0 && screenX < W) {
    // Shadow on ground
    const shadowY = 460 + (H - 460) * perspective;
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(screenX, shadowY, Math.max(2, screenSize * 2.5), Math.max(1, screenSize * 0.4), 0, 0, Math.PI * 2);
    ctx.fill();

    // Trail
    if (hitBall.timer < 60) {
      const trailAlpha = Math.max(0, 0.12 - hitBall.timer * 0.002);
      ctx.strokeStyle = `rgba(255,255,240,${trailAlpha})`;
      ctx.lineWidth = screenSize * 0.5;
      ctx.beginPath();
      ctx.moveTo(screenX, screenY);
      ctx.lineTo(screenX - hitBall.vx * perspective * 3, screenY + 8);
      ctx.stroke();
    }

    drawBall3D(screenX, screenY, screenSize, hitBall.timer * 0.3);
  }
}

// ==============================================================
// FIREWORKS / PARTICLES
// ==============================================================

function spawnFirework(x, y) {
  const baseHue = Math.random() * 360;
  for (let i = 0; i < 55; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5.5;
    const hue = baseHue + (Math.random() - 0.5) * 40;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.007 + Math.random() * 0.014,
      color: `hsl(${hue}, 100%, ${55 + Math.random() * 35}%)`,
      size: 1.5 + Math.random() * 3,
      trail: true
    });
  }
  particles.push({
    x, y, vx: 0, vy: 0, life: 0.8, decay: 0.05,
    color: '#fff', size: 18, trail: false
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.06; p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    if (p.size > 2) {
      ctx.globalAlpha = Math.max(0, p.life * 0.25);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life * 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function drawImpactFlash() {
  if (impactFlash > 0) {
    // Bright spark at contact
    const flashG = ctx.createRadialGradient(940, H - 60, 0, 940, H - 60, 90 * impactFlash);
    flashG.addColorStop(0, `rgba(255,255,255,${impactFlash * 0.9})`);
    flashG.addColorStop(0.3, `rgba(255,245,210,${impactFlash * 0.4})`);
    flashG.addColorStop(0.6, `rgba(255,230,170,${impactFlash * 0.15})`);
    flashG.addColorStop(1, 'rgba(255,220,150,0)');
    ctx.fillStyle = flashG;
    ctx.beginPath();
    ctx.arc(940, H - 60, 90 * impactFlash, 0, Math.PI * 2);
    ctx.fill();
    impactFlash -= 0.035;
  }
}

// POST-PROCESSING
// ==============================================================

function applyPostProcessing() {
  // ---- Vignette (darken edges ~15%) ----
  const vigG = ctx.createRadialGradient(W/2, H/2, Math.min(W, H) * 0.35, W/2, H/2, Math.max(W, H) * 0.75);
  vigG.addColorStop(0, 'rgba(0,0,0,0)');
  vigG.addColorStop(0.6, 'rgba(0,0,0,0)');
  vigG.addColorStop(0.85, 'rgba(0,0,0,0.12)');
  vigG.addColorStop(1, 'rgba(0,0,0,0.30)');
  ctx.fillStyle = vigG;
  ctx.fillRect(0, 0, W, H);

  // ---- Warm color grading (amber shift) ----
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#cc8830';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // ---- Film grain (very subtle, ~3% opacity) ----
  ctx.globalAlpha = 0.03;
  ctx.globalCompositeOperation = 'overlay';
  // Offset grain each frame for organic feel
  const gx = (frameCount * 37) % 256;
  const gy = (frameCount * 53) % 256;
  const grainPat = ctx.createPattern(grainCanvas, 'repeat');
  ctx.save();
  ctx.translate(gx, gy);
  ctx.fillStyle = grainPat;
  ctx.fillRect(-gx, -gy, W + 256, H + 256);
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  // ---- Bloom on bright areas (stadium lights) ----
  // Soft glow overlay on top portion where lights are
  const bloomG = ctx.createLinearGradient(0, 0, 0, 250);
  bloomG.addColorStop(0, 'rgba(255,255,220,0.008)');
  bloomG.addColorStop(0.5, 'rgba(255,255,210,0.004)');
  bloomG.addColorStop(1, 'rgba(255,255,200,0)');
  ctx.fillStyle = bloomG;
  ctx.fillRect(0, 0, W, 250);
}

// ==============================================================
// HUD (in-game overlays)
// ==============================================================

function drawHUD() {
  ctx.save();

  // Distance display
  if (lastHitTimer > 0) {
    const alpha = Math.min(1, lastHitTimer / 25);
    const yOff = lastHitTimer > 50 ? (60 - lastHitTimer) * 0.5 : 0;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 34px Arial Black';
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.textAlign = 'center';
    ctx.fillText(lastHitText, 962, 152 + yOff);
    ctx.fillStyle = '#ffdd88';
    ctx.fillText(lastHitText, 960, 150 + yOff);
    ctx.globalAlpha = 1;
    lastHitTimer--;
  }

  // HOME RUN text - cinematic
  if (hrTextTimer > 0) {
    const progress = 1 - hrTextTimer / 100;
    const scale = progress < 0.12 ? progress / 0.12 * 1.15 : progress < 0.22 ? 1.15 - (progress - 0.12) * 1.5 : 1;
    const alpha = hrTextTimer > 12 ? 1 : hrTextTimer / 12;
    ctx.save();
    ctx.translate(960, 320);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    // LED board background
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.beginPath();
    ctx.roundRect(-260, -55, 520, 88, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,50,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Glow behind text
    ctx.shadowColor = 'rgba(255,200,50,0.4)';
    ctx.shadowBlur = 20;
    ctx.font = 'italic bold 68px "Arial Black", sans-serif';
    const hrG = ctx.createLinearGradient(-200, -30, -200, 25);
    hrG.addColorStop(0, '#fff');
    hrG.addColorStop(0.25, '#ffee88');
    hrG.addColorStop(0.55, '#ffcc00');
    hrG.addColorStop(0.8, '#ff9900');
    hrG.addColorStop(1, '#ff6600');
    ctx.fillStyle = hrG;
    ctx.textAlign = 'center';
    ctx.fillText('HOME RUN!', 0, 18);
    ctx.shadowBlur = 0;

    ctx.globalAlpha = 1;
    ctx.restore();
    hrTextTimer--;
  }

  // Strike text
  if (strikeTimer > 0) {
    const alpha = Math.min(1, strikeTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 58px Arial Black';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText('STRIKE!', 962, 312);
    ctx.fillStyle = '#ff3333';
    ctx.fillText('STRIKE!', 960, 310);
    ctx.globalAlpha = 1;
    strikeTimer--;
  }

  // Foul text
  if (foulTimer > 0) {
    const alpha = Math.min(1, foulTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 48px Arial Black';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText('FOUL BALL', 962, 312);
    ctx.fillStyle = '#ffaa44';
    ctx.fillText('FOUL BALL', 960, 310);
    ctx.globalAlpha = 1;
    foulTimer--;
  }

  ctx.restore();
}

function drawTitle() {
  ctx.fillStyle = '#020308';
  ctx.fillRect(0, 0, W, H);

  // Night sky gradient
  const skyG = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  skyG.addColorStop(0, '#010206');
  skyG.addColorStop(0.3, '#040a18');
  skyG.addColorStop(0.6, '#081428');
  skyG.addColorStop(0.8, '#0c1a30');
  skyG.addColorStop(1, '#101e34');
  ctx.fillStyle = skyG;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Stars
  const rng = mulberry32(88);
  for (let i = 0; i < 140; i++) {
    const sx = rng() * W;
    const sy = rng() * H * 0.38;
    const twinkle = 0.5 + 0.5 * Math.sin(frameCount * 0.012 + i * 3.1);
    ctx.globalAlpha = (0.15 + rng() * 0.45) * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 0.3 + rng() * 0.9, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Stadium silhouette
  const stadG = ctx.createLinearGradient(0, 310, 0, H);
  stadG.addColorStop(0, '#080810');
  stadG.addColorStop(1, '#040408');
  ctx.fillStyle = stadG;
  ctx.beginPath();
  ctx.moveTo(0, 580);
  ctx.lineTo(60, 440); ctx.lineTo(130, 380); ctx.lineTo(280, 345);
  ctx.lineTo(480, 325); ctx.lineTo(680, 312); ctx.lineTo(960, 308);
  ctx.lineTo(1240, 312); ctx.lineTo(1440, 325); ctx.lineTo(1640, 345);
  ctx.lineTo(1790, 380); ctx.lineTo(1860, 440);
  ctx.lineTo(W, 580); ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Field glow
  const fieldGlow = ctx.createRadialGradient(960, 510, 40, 960, 510, 550);
  fieldGlow.addColorStop(0, 'rgba(80,140,60,0.07)');
  fieldGlow.addColorStop(0.5, 'rgba(60,120,40,0.03)');
  fieldGlow.addColorStop(1, 'rgba(40,80,30,0)');
  ctx.fillStyle = fieldGlow;
  ctx.beginPath();
  ctx.ellipse(960, 510, 650, 220, 0, 0, Math.PI * 2);
  ctx.fill();

  // Stadium light banks
  const lightPositions = [[160, 370], [380, 335], [680, 318], [1240, 318], [1540, 335], [1760, 370]];
  lightPositions.forEach(([lx, ly]) => {
    const lGlow = ctx.createRadialGradient(lx, ly, 2, lx, ly, 70);
    lGlow.addColorStop(0, 'rgba(255,255,220,0.18)');
    lGlow.addColorStop(0.4, 'rgba(255,255,200,0.05)');
    lGlow.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = lGlow;
    ctx.beginPath();
    ctx.arc(lx, ly, 70, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,220,0.75)';
    ctx.fillRect(lx - 12, ly - 3, 24, 7);
  });

  // Arch silhouette
  ctx.save();
  const archCx = 1160, archBase = 345, archH = 175, archW = 98;
  const aglow = ctx.createRadialGradient(archCx, archBase - archH * 0.5, 5, archCx, archBase - archH * 0.3, 110);
  aglow.addColorStop(0, 'rgba(140,150,175,0.04)');
  aglow.addColorStop(1, 'rgba(140,150,175,0)');
  ctx.fillStyle = aglow;
  ctx.beginPath();
  ctx.arc(archCx, archBase - archH * 0.3, 110, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  const cosh = (x) => (Math.exp(x) + Math.exp(-x)) / 2;
  for (let t = -1; t <= 1; t += 0.01) {
    const ax = archCx + t * archW;
    const raw = cosh(t * 1.8) / cosh(1.8);
    const ay = archBase - archH * (1 - raw);
    if (t === -1) ctx.moveTo(ax, ay); else ctx.lineTo(ax, ay);
  }
  const archMG = ctx.createLinearGradient(archCx - archW, 0, archCx + archW, 0);
  archMG.addColorStop(0, 'rgba(80,88,105,0.25)');

  archMG.addColorStop(0.75, 'rgba(120,130,150,0.40)');
  archMG.addColorStop(1, 'rgba(80,88,105,0.25)');
  ctx.strokeStyle = archMG;
  ctx.lineWidth = 7;
  ctx.stroke();
  ctx.restore();

  // ==== Title text ====
  const t = Date.now() * 0.001;
  ctx.save();
  ctx.textAlign = 'center';

  // "HOMER" - premium metallic gold
  ctx.font = 'italic 900 155px "Arial Black", Impact, sans-serif';

  // Warm glow

  ctx.shadowBlur = 55;

  // Thin bright edge on top for depth

  // Subtitle

  ctx.fillStyle = '#687888';
  ctx.fillText('H O M E   R U N   D E R B Y', 960, 558);

  // Decorative line with baseball seam motif

  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(640, 574);
  ctx.lineTo(1280, 574);
  ctx.stroke();
  // Seam decorations
  ctx.strokeStyle = 'rgba(180,50,40,0.18)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let a = 0; a < 1; a += 0.08) {

// ==============================================================
// PITCH / SWING / GAME LOGIC
// ==============================================================

function startPitch() {
  if (pitchesLeft <= 0) return;
  const pt = randomPitch();
  const targetX = 935 + Math.random() * 50;

  windupPhase = 1;
  windupTimer = 0;

  setTimeout(() => {
    windupPhase = 2;
    windupTimer = 0;

    pitch = {
      t: 0, speed: pt.speed, curve: pt.curve, mph: pt.mph, name: pt.name,
      startX: 960, startY: 655, targetX: targetX, targetY: H - 50,
      x: 960, y: 655, size: 4, active: true, rotation: 0
    };
    pitchSpeedDisplay = { text: pt.mph + ' MPH  ' + pt.name.toUpperCase(), timer: 90 };
    canSwing = true;
    swingTime = -1;
    ballTrail = [];
    state = 'pitching';

    setTimeout(() => { windupPhase = 0; }, 250);
  }, 650);
}

function updatePitch(dt) {
  if (!pitch || !pitch.active) return;
  pitch.t += pitch.speed * dt;
  pitch.rotation += pitch.speed * dt * 15;

  if (pitch.t >= 1) {
    if (swingTime < 0) {
      strikeTimer = 60;
      pitch.active = false;
      pitchesLeft--;
      canSwing = false;
      setTimeout(() => {
        if (pitchesLeft > 0) { state = 'playing'; startPitch(); }
        else endRound();
      }, 800);
    }
    return;
  }

  const t = pitch.t;
  const easeT = t * t;
  pitch.x = pitch.startX + (pitch.targetX - pitch.startX) * t;
  if (pitch.curve) pitch.x += Math.sin(t * Math.PI) * 40 * pitch.curve;
  pitch.y = pitch.startY + (pitch.targetY - pitch.startY) * easeT;
  pitch.size = 3 + easeT * 24;

  if (ballTrail.length > 10) ballTrail.shift();
  ballTrail.push({ x: pitch.x, y: pitch.y, s: pitch.size });
}

function doSwing() {
  if (!canSwing || swingTime >= 0 || !pitch || !pitch.active) return;
  swingTime = 0;
  canSwing = false;

  const t = pitch.t;
  const sweetSpot = 0.88;
  const diff = Math.abs(t - sweetSpot);

  setTimeout(() => {
    if (!pitch) return;
    pitch.active = false;
    pitchesLeft--;

    if (t < 0.5) { strikeTimer = 60; afterPitch(); return; }

    if (diff < 0.04) {
      const dist = 400 + Math.random() * 80;
      const angle = -0.1 + Math.random() * 0.2;
      launchHitBall(dist, angle, true);
    } else if (diff < 0.1) {
      const dist = 320 + Math.random() * 100;
      const angle = (t > sweetSpot ? 0.3 : -0.3) + Math.random() * 0.2;
      launchHitBall(dist, angle, dist > 370);
    } else if (diff < 0.2) {
      foulTimer = 60;
      launchHitBall(150, (t > sweetSpot ? 1.2 : -1.2), false);
    } else {
      if (t > 0.6) {
        foulTimer = 60;
        launchHitBall(80, t > sweetSpot ? 1.5 : -1.5, false);
      } else {
        strikeTimer = 60;
      }
      afterPitch(); return;
    }
  }, 120);
}

function launchHitBall(distance, angle, isHR) {
  const speed = distance * 0.3;
  hitBall = {
    x: 960, y: H - 60, z: 0,
    vx: Math.sin(angle) * speed * 0.3,
    vz: speed,
    vy: -speed * 0.4,
    height: 0, size: 18, distance: distance,
    isHR: isHR, timer: 0
  };

  lastHitDist = Math.round(distance);
  lastHitText = lastHitDist + ' FT';
  lastHitTimer = 80;
  impactFlash = 1;
  shakeAmount = isHR ? 10 : 4;

  if (isHR) {
    homeRuns++;
    consecutiveHR++;
    hrTextTimer = 100;
    crowdFlash = 1;
    setTimeout(() => {
      for (let i = 0; i < 3 + Math.min(consecutiveHR, 5); i++) {
        setTimeout(() => {
          spawnFirework(250 + Math.random() * 1420, 100 + Math.random() * 200);
        }, i * 250);
      }
    }, 500);
  } else {
    consecutiveHR = 0;
  }

  state = 'result';
  resultTimer = 120;
}

function updateHitBall() {
  if (!hitBall) return;
  hitBall.timer++;
  hitBall.x += hitBall.vx;
  hitBall.z += hitBall.vz;
  hitBall.height += hitBall.vy;
  hitBall.vy += 0.5;
  hitBall.vz *= 0.99;
  hitBall.vx *= 0.99;
  if (hitBall.height > 0 && hitBall.timer > 30) hitBall = null;
}

function afterPitch() {
  setTimeout(() => {
    if (pitchesLeft > 0) { state = 'playing'; startPitch(); }
    else endRound();
  }, 600);
}

function endRound() {
  roundScores.push(homeRuns);
  totalHR += homeRuns;
  round++;
  state = round > 3 ? 'gameOver' : 'roundEnd';
}

// ==============================================================
// MAIN GAME LOOP
// ==============================================================

let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(3, (timestamp - lastTime) / 16.67);
  lastTime = timestamp;
  frameCount++;

  if (windupPhase > 0) windupTimer += dt;

  ctx.save();
  if (shakeAmount > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount,
      (Math.random() - 0.5) * shakeAmount
    );
    shakeAmount *= shakeDecay;
  }

  if (state === 'title') {
    drawTitle();
  } else if (state === 'roundEnd') {
    drawStadiumScene();
    applyPostProcessing();
    drawRoundEnd();
  } else if (state === 'gameOver') {
    drawStadiumScene();
    applyPostProcessing();
    drawGameOver();
  } else {
    drawStadiumScene();

    // Pitched ball
    if (pitch && pitch.active) {
      drawBallTrail();
      drawBall3D(pitch.x, pitch.y, pitch.size, pitch.rotation);
    }

    // Hit ball
    if (hitBall) {
      updateHitBall();
      drawHitBall();
    }

    // Batter
    drawBatter();

    // Bat with swing
    let swingProg = -1;
    if (swingTime >= 0) {
      swingProg = Math.min(1, swingTime / 8);
      swingTime += dt;
      if (swingTime > 20) swingTime = -1;
    }
    drawBatDetailed(swingProg);

    drawImpactFlash();
    drawParticles();

    // Post-processing
    applyPostProcessing();

    // HUD and scorebug on top of post-processing
    drawScorebug();
    drawHUD();

    updatePitch(dt);
    updateParticles();

    if (state === 'result') {
      resultTimer -= dt;
      if (resultTimer <= 0) {
        hitBall = null;
        afterPitch();
      }
    }
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// ==============================================================
// INPUT HANDLING
// ==============================================================

function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function handleInput(e) {
  e.preventDefault();
  const pos = getCanvasCoords(e);

  if (state === 'title') {
    if (pos.x > 825 && pos.x < 1095 && pos.y > 722 && pos.y < 786) startGame();
  } else if (state === 'pitching') {
    doSwing();
  } else if (state === 'roundEnd') {
    if (pos.x > 800 && pos.x < 1120 && pos.y > 500 && pos.y < 700) {
      homeRuns = 0; pitchesLeft = 10; consecutiveHR = 0;
      state = 'playing'; startPitch();
    }
  } else if (state === 'gameOver') {
    if (pos.x > 800 && pos.x < 1120 && pos.y > 600 && pos.y < 800) {
      resetGame(); startGame();
    }
  }
}

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });
document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

function startGame() {
  round = 1; pitchesLeft = 10; homeRuns = 0; totalHR = 0;
  roundScores = []; consecutiveHR = 0;
  particles = []; fireworks = [];
  windupPhase = 0; windupTimer = 0;
  state = 'playing'; startPitch();
}

function resetGame() {
  round = 1; pitchesLeft = 10; homeRuns = 0; totalHR = 0;
  roundScores = []; consecutiveHR = 0;
  particles = []; fireworks = [];
  pitch = null; hitBall = null; swingTime = -1;
  hrTextTimer = 0; strikeTimer = 0; foulTimer = 0;
  lastHitTimer = 0; shakeAmount = 0; impactFlash = 0;
  crowdFlash = 0; windupPhase = 0; windupTimer = 0;
}

requestAnimationFrame(gameLoop);

})();
</script>
